// ============================================================
// CORE ENGINE
// ============================================================

function evaluateCurve(curveDef, inputValue) {
  const { segments, lowerLimit, upperLimit } = curveDef;
  const v = Math.max(segments[0].start, Math.min(segments[segments.length - 1].end, inputValue));
  let seg = segments[segments.length - 1];
  for (let i = 0; i < segments.length; i++) {
    if (v >= segments[i].start && v < segments[i].end) { seg = segments[i]; break; }
    if (i === segments.length - 1 && v === segments[i].end) seg = segments[i];
  }
  let r = seg.startValue + seg.slope * (v - seg.start);
  if (lowerLimit != null) r = Math.max(lowerLimit, r);
  if (upperLimit != null) r = Math.min(upperLimit, r);
  return r;
}

// ============================================================
// GEAR AGGREGATOR
// ============================================================

const ARMOR_SLOTS = ["head", "chest", "back", "hands", "legs", "feet", "ring1", "ring2", "necklace"];
const WEAPON_ONLY = new Set(["additionalWeaponDamage"]);

function aggregateGear(classData, gear, weaponHeldState) {
  const attrs = { ...classData.baseStats };
  const bonuses = {};

  function addItem(item) {
    if (!item) return;
    for (const { stat, value } of [...(item.inherentStats || []), ...(item.modifiers || [])]) {
      if (WEAPON_ONLY.has(stat)) continue;
      if (CORE_ATTRS.has(stat)) attrs[stat] = (attrs[stat] || 0) + value;
      else bonuses[stat] = (bonuses[stat] || 0) + value;
    }
  }

  for (const slot of ARMOR_SLOTS) addItem(gear[slot]);

  let activeWeapon = null;
  if (weaponHeldState !== "none" && gear[weaponHeldState]) {
    const ws = gear[weaponHeldState];
    addItem(ws.primary);
    addItem(ws.secondary);
    activeWeapon = ws.primary;
  }

  return { attrs, bonuses, activeWeapon };
}

// ============================================================
// DERIVED STAT PIPELINE
// ============================================================

function computeDerivedStats(attrs, bonuses, perkEffects) {
  const s = {};
  const C = CONSTANTS;

  s.physicalPower = attrs.str + (bonuses.physicalPower || 0);
  s.ppbFromCurve = evaluateCurve(STAT_CURVES.physicalPowerBonus, s.physicalPower);
  s.ppbFromBonuses = bonuses.physicalDamageBonus || 0;
  s.ppb = s.ppbFromCurve + s.ppbFromBonuses;

  s.magicalPower = attrs.wil + (bonuses.magicalPower || 0);
  s.mpbFromCurve = evaluateCurve(STAT_CURVES.magicPowerBonus, s.magicalPower);
  s.mpbFromBonuses = bonuses.magicalDamageBonus || 0;
  s.mpb = s.mpbFromCurve + s.mpbFromBonuses;

  s.healthRating = attrs.str * 0.25 + attrs.vig * 0.75;
  s.health = Math.ceil(evaluateCurve(STAT_CURVES.health, s.healthRating)) + (bonuses.maxHealth || 0);

  s.actionSpeedRating = attrs.agi * 0.25 + attrs.dex * 0.75;
  s.actionSpeed = evaluateCurve(STAT_CURVES.actionSpeed, s.actionSpeedRating) + (bonuses.actionSpeed || 0);

  s.moveSpeed = Math.min(C.MOVE_SPEED_CAP,
    C.BASE_MOVE_SPEED + evaluateCurve(STAT_CURVES.moveSpeed, attrs.agi) + (bonuses.moveSpeed || 0));

  s.armorRating = (bonuses.armorRating || 0) + (bonuses.additionalArmorRating || 0);
  s.pdrFromCurve = evaluateCurve(STAT_CURVES.armorRatingToPDR, s.armorRating);
  s.pdrFromBonuses = bonuses.physicalDamageReduction || 0;
  s.pdrCap = perkEffects.fighterDefenseMastery ? C.PDR_CAP_FIGHTER : C.PDR_CAP;
  s.pdr = Math.min(s.pdrCap, s.pdrFromCurve + s.pdrFromBonuses);

  s.magicResistance = evaluateCurve(STAT_CURVES.willToMagicResistance, attrs.wil) + (bonuses.magicResistance || 0);
  s.mdrFromCurve = evaluateCurve(STAT_CURVES.magicResistanceToMDR, s.magicResistance);
  s.mdrFromBonuses = bonuses.magicalDamageReduction || 0;
  s.mdrCap = perkEffects.barbarianIronWill ? C.MDR_CAP_BARBARIAN : C.MDR_CAP;
  s.mdr = Math.min(s.mdrCap, s.mdrFromCurve + s.mdrFromBonuses);

  s.hasAntimagic = !!perkEffects.antimagic;
  s.effectiveMagicDmgTaken = s.hasAntimagic ? (1 - s.mdr) * (1 - C.ANTIMAGIC) : (1 - s.mdr);

  s.healthRecovery = evaluateCurve(STAT_CURVES.healthRecovery, attrs.vig);
  s.spellCastingSpeed = evaluateCurve(STAT_CURVES.spellCastingSpeed, attrs.kno) + (perkEffects.spellCastingSpeedBonus || 0);
  const memCurve = evaluateCurve(STAT_CURVES.memoryCapacity, attrs.kno);
  s.memoryCapacity = Math.ceil(memCurve * (1 + (bonuses.memoryCapacityBonus || 0))) + (bonuses.additionalMemoryCapacity || 0);
  s.memoryRecovery = evaluateCurve(STAT_CURVES.memoryRecovery, attrs.kno);
  s.buffDuration = evaluateCurve(STAT_CURVES.buffDuration, attrs.wil) + (bonuses.buffDurationBonus || 0);
  s.debuffDuration = evaluateCurve(STAT_CURVES.debuffDuration, attrs.wil);
  s.cdr = Math.min(C.CDR_CAP, evaluateCurve(STAT_CURVES.cooldownReduction, attrs.res) + (bonuses.cooldownReductionBonus || 0));
  s.persuasiveness = evaluateCurve(STAT_CURVES.persuasiveness, attrs.res);
  s.manualDexterity = Math.min(C.MANUAL_DEX_CAP, evaluateCurve(STAT_CURVES.manualDexterity, attrs.dex));
  s.equipSpeed = evaluateCurve(STAT_CURVES.itemEquipSpeed, attrs.dex);
  s.regularInteractionSpeed = evaluateCurve(STAT_CURVES.regularInteractionSpeed, attrs.dex * 0.25 + attrs.res * 0.75);
  s.magicalInteractionSpeed = evaluateCurve(STAT_CURVES.magicalInteractionSpeed, attrs.wil);
  s.armorPenetration = bonuses.armorPenetration || 0;
  s.magicPenetration = bonuses.magicPenetration || 0;
  s.headshotDamageBonus = bonuses.headshotDamageBonus || 0;
  s.projectileDamageReduction = bonuses.projectileDamageReduction || 0;
  s.headshotDamageReduction = bonuses.headshotDamageReduction || 0;

  return s;
}

// ============================================================
// DAMAGE CALCULATORS
// ============================================================

function calcPhysicalMeleeDamage({ baseWeaponDmg, buffWeaponDmg = 0, comboMultiplier = 1.0,
  impactZone = 1.0, gearWeaponDmg = 0, ppb, additionalPhysicalDmg = 0, hitLocation = "body",
  headshotBonus = 0, targetHeadshotDR = 0, targetPDR, attackerPen = 0, projectileReduction = 0, truePhysicalDmg = 0 }) {
  const C = CONSTANTS;
  let hlm = 1.0;
  if (hitLocation === "head") hlm = 1.0 + C.HS_BASE_MULT + headshotBonus - targetHeadshotDR;
  else if (hitLocation === "limb") hlm = C.LIMB_MULT;
  const dr = Math.max(1 - targetPDR * (1 - attackerPen), 1 - targetPDR);
  const base = (baseWeaponDmg + buffWeaponDmg) * comboMultiplier * impactZone + gearWeaponDmg;
  return Math.floor((base * (1 + ppb) + additionalPhysicalDmg) * hlm * dr * (1 - projectileReduction) + truePhysicalDmg);
}

function calcSpellDamage({ baseDamage, scaling, mpb, hitLocation = "body", affectedByHitLocation = true,
  headshotBonus = 0, targetHeadshotDR = 0, targetMDR, attackerMagicPen = 0, typeBonuses = 0 }) {
  const C = CONSTANTS;
  let hlm = 1.0;
  if (affectedByHitLocation) {
    if (hitLocation === "head") hlm = 1.0 + C.HS_BASE_MULT + headshotBonus - targetHeadshotDR;
    else if (hitLocation === "limb") hlm = C.LIMB_MULT;
  }
  const dr = Math.max(1 - targetMDR * (1 - attackerMagicPen), 1 - targetMDR);
  return Math.floor(baseDamage * (1 + mpb * scaling + typeBonuses) * hlm * dr);
}

// ============================================================
// UNIT TESTS
// ============================================================

function runTests() {
  const R = [];
  const pass = (n) => R.push({ name: n, status: "PASS" });
  const fail = (n, e, g) => R.push({ name: n, status: "FAIL", expected: e, got: g });
  const eq = (a, b, t = 0.015) => Math.abs(a - b) <= t;
  let v;

  // Naked warlock curves
  v = evaluateCurve(STAT_CURVES.physicalPowerBonus, 11); eq(v, -0.08) ? pass("PPB(11)=-8%") : fail("PPB(11)", -0.08, v);
  v = evaluateCurve(STAT_CURVES.physicalPowerBonus, 15); eq(v, 0) ? pass("PPB(15)=0%") : fail("PPB(15)", 0, v);
  v = evaluateCurve(STAT_CURVES.magicPowerBonus, 22); eq(v, 0.07) ? pass("MPB(22)=7%") : fail("MPB(22)", 0.07, v);
  v = evaluateCurve(STAT_CURVES.health, 13.25); eq(v, 121.5, 0.5) ? pass("HP(13.25)=121.5") : fail("HP(13.25)", 121.5, v);
  v = evaluateCurve(STAT_CURVES.actionSpeed, 14.75); eq(v, -0.0025, 0.005) ? pass("AS(14.75)") : fail("AS(14.75)", -0.0025, v);
  v = evaluateCurve(STAT_CURVES.moveSpeed, 14); eq(v, -1, 0.1) ? pass("MS(14)=-1") : fail("MS(14)", -1, v);
  v = evaluateCurve(STAT_CURVES.willToMagicResistance, 22); eq(v, 58, 0.5) ? pass("WIL→MR(22)=58") : fail("WIL→MR(22)", 58, v);
  v = evaluateCurve(STAT_CURVES.cooldownReduction, 14); eq(v, -0.02) ? pass("CDR(14)=-2%") : fail("CDR(14)", -0.02, v);
  v = evaluateCurve(STAT_CURVES.spellCastingSpeed, 15); eq(v, 0) ? pass("SCS(15)=0%") : fail("SCS(15)", 0, v);
  v = evaluateCurve(STAT_CURVES.memoryCapacity, 15); eq(v, 9, 0.1) ? pass("Mem(15)=9") : fail("Mem(15)", 9, v);
  v = evaluateCurve(STAT_CURVES.buffDuration, 22); eq(v, 0.07) ? pass("BD(22)=7%") : fail("BD(22)", 0.07, v);
  v = evaluateCurve(STAT_CURVES.debuffDuration, 22); eq(v, -0.065) ? pass("DD(22)=-6.5%") : fail("DD(22)", -0.065, v);
  v = evaluateCurve(STAT_CURVES.debuffDuration, 38); eq(v, -0.187) ? pass("DD(38)=-18.7%") : fail("DD(38)", -0.187, v);
  v = evaluateCurve(STAT_CURVES.healthRecovery, 14); eq(v, -0.03) ? pass("HRec(14)=-3%") : fail("HRec(14)", -0.03, v);
  v = evaluateCurve(STAT_CURVES.persuasiveness, 14); eq(v, 14, 0.1) ? pass("Pers(14)=14") : fail("Pers(14)", 14, v);
  v = evaluateCurve(STAT_CURVES.manualDexterity, 15); eq(v, 0) ? pass("MD(15)=0%") : fail("MD(15)", 0, v);
  v = evaluateCurve(STAT_CURVES.itemEquipSpeed, 15); eq(v, 0) ? pass("ES(15)=0%") : fail("ES(15)", 0, v);
  v = evaluateCurve(STAT_CURVES.magicalInteractionSpeed, 22); eq(v, 0.49) ? pass("MIS(22)=49%") : fail("MIS(22)", 0.49, v);
  v = evaluateCurve(STAT_CURVES.memoryRecovery, 15); eq(v, 0.655) ? pass("MRec(15)=65.5%") : fail("MRec(15)", 0.655, v);
  v = evaluateCurve(STAT_CURVES.regularInteractionSpeed, 14.25); eq(v, -0.01125, 0.005) ? pass("RIS(14.25)") : fail("RIS(14.25)", -0.01125, v);

  // Dynamic aggregation — no weapon
  const { attrs, bonuses } = aggregateGear(WARLOCK, EQUIPPED_GEAR, "none");
  attrs.str === 31 ? pass("AGG STR=31") : fail("AGG STR", 31, attrs.str);
  attrs.vig === 20 ? pass("AGG VIG=20") : fail("AGG VIG", 20, attrs.vig);
  attrs.agi === 17 ? pass("AGG AGI=17") : fail("AGG AGI", 17, attrs.agi);
  attrs.dex === 27 ? pass("AGG DEX=27") : fail("AGG DEX", 27, attrs.dex);
  attrs.wil === 38 ? pass("AGG WIL=38") : fail("AGG WIL", 38, attrs.wil);
  attrs.kno === 18 ? pass("AGG KNO=18") : fail("AGG KNO", 18, attrs.kno);
  attrs.res === 14 ? pass("AGG RES=14") : fail("AGG RES", 14, attrs.res);
  eq(bonuses.physicalPower, 10, 0.1) ? pass("AGG PP=10") : fail("AGG PP", 10, bonuses.physicalPower);
  eq(bonuses.armorRating, 297, 0.1) ? pass("AGG AR=297") : fail("AGG AR", 297, bonuses.armorRating);
  eq(bonuses.magicResistance, 142, 0.5) ? pass("AGG gearMR=142") : fail("AGG gearMR", 142, bonuses.magicResistance);

  // Derived stats vs in-game
  const pe = { antimagic: false, spellCastingSpeedBonus: -0.10 };
  const ds = computeDerivedStats(attrs, bonuses, pe);
  ds.health === 145 ? pass("HP=145") : fail("HP", 145, ds.health);
  eq(ds.ppb, 0.326) ? pass("PPB=32.6%") : fail("PPB", 0.326, ds.ppb);
  eq(ds.mpb, 0.23) ? pass("MPB=23%") : fail("MPB", 0.23, ds.mpb);
  eq(ds.pdr, 0.4225, 0.005) ? pass("PDR≈42.2%") : fail("PDR", 0.4225, ds.pdr);
  eq(ds.magicResistance, 259, 1) ? pass("MR=259") : fail("MR", 259, ds.magicResistance);
  eq(ds.mdr, 0.65) ? pass("MDR=65%cap") : fail("MDR", 0.65, ds.mdr);
  eq(ds.debuffDuration, -0.187) ? pass("DD=-18.7%") : fail("DD", -0.187, ds.debuffDuration);
  ds.memoryCapacity === 12 ? pass("Mem=12") : fail("Mem", 12, ds.memoryCapacity);
  eq(ds.buffDuration, 0.23) ? pass("BD=23%") : fail("BD", 0.23, ds.buffDuration);
  eq(ds.spellCastingSpeed, -0.037) ? pass("SCS=-3.7%") : fail("SCS", -0.037, ds.spellCastingSpeed);

  // Weapon slot aggregation
  const w1 = aggregateGear(WARLOCK, EQUIPPED_GEAR, "weaponSlot1");
  eq(w1.bonuses.armorPenetration, 0.105, 0.001) ? pass("W1 APen=10.5%") : fail("W1 APen", 0.105, w1.bonuses.armorPenetration);
  w1.activeWeapon?.weaponDamage === 40 ? pass("W1 WpnDmg=40") : fail("W1 WpnDmg", 40, w1.activeWeapon?.weaponDamage);

  const w2 = aggregateGear(WARLOCK, EQUIPPED_GEAR, "weaponSlot2");
  const ds2 = computeDerivedStats(w2.attrs, w2.bonuses, pe);
  ds2.memoryCapacity === 17 ? pass("W2 Mem=17") : fail("W2 Mem", 17, ds2.memoryCapacity);

  // Damage calcs
  v = calcSpellDamage({ baseDamage: 12, scaling: 1.0, mpb: 0.23, targetMDR: 0.06 });
  v === 13 ? pass("BoC body=13") : fail("BoC body", 13, v);
  v = calcSpellDamage({ baseDamage: 12, scaling: 1.0, mpb: 0.23, hitLocation: "head", affectedByHitLocation: true, targetMDR: 0.06 });
  v === 20 ? pass("BoC head=20") : fail("BoC head", 20, v);
  v = calcPhysicalMeleeDamage({ baseWeaponDmg: 40, buffWeaponDmg: 5, gearWeaponDmg: 2, ppb: 0.351, targetPDR: -0.22, attackerPen: 0.105 });
  v === 77 ? pass("Spectral+BSB=77") : fail("Spectral+BSB", 77, v);

  return R;
}

const fmtPct = (v) => {
  const p = v * 100;
  // Round to 1 decimal (matches in-game display)
  const rounded = Math.round(Math.abs(p) * 10) / 10;
  return `${p < -0.0001 ? "-" : ""}${rounded}%`;
};
const fmtFlat = (v) => typeof v === "number" ? (Number.isInteger(v) ? String(v) : v.toFixed(1)) : v;

    const { attrs, bonuses, activeWeapon } = aggregateGear(WARLOCK, EQUIPPED_GEAR, weapon);
    const pe = { antimagic: ACTIVE_PERKS.antimagic, spellCastingSpeedBonus: ACTIVE_PERKS.demonArmor ? -0.10 : 0 };

        {showDebug && <pre style={{ marginTop: 12, background: "#0d0d14", border: "1px solid #1e1e2e", borderRadius: 6, padding: 12, fontSize: 10, overflow: "auto", maxHeight: 400, color: "#888" }}>{JSON.stringify({ attrs: computed.attrs, bonuses: computed.bonuses, derived: ds }, null, 2)}</pre>}
      </div>

      <div style={{ marginTop: 40, padding: "16px 0", borderTop: "1px solid #1e1e2e", fontSize: 10, color: "#444" }}>Phase 1 · {tests.length} tests · Dynamic gear aggregation from {Object.keys(EQUIPPED_GEAR).length} items</div>
    </div>
  );
}

function Sec({ title, children }) {
  return <div style={{ marginBottom: 20 }}><div style={{ fontSize: 11, color: "#555", textTransform: "uppercase", letterSpacing: "0.12em", marginBottom: 8, fontWeight: 600 }}>{title}</div><div style={{ background: "#0d0d14", border: "1px solid #1a1a28", borderRadius: 6, padding: 12 }}>{children}</div></div>;
}
function SG({ children }) {
  return <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(240px, 1fr))", gap: "2px 16px" }}>{children}</div>;
}
function SR({ label, value, base, detail }) {
  return <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", padding: "4px 0", borderBottom: "1px solid #111118" }}>
    <span style={{ color: "#888", fontSize: 12 }}>{label}{base != null && <span style={{ color: "#444", fontSize: 10 }}> ({base})</span>}</span>
    <span style={{ color: "#e0e0ec", fontSize: 12, fontWeight: 500 }}>
      {value}
      {detail && (() => {
        const isRating = typeof detail === "string" && detail.startsWith("rating");
        return <span title={isRating ? "Intermediate value before curve — not shown in-game. Shows where you sit on the piecewise stat curve." : undefined}
          style={{ color: "#555", fontSize: 10, marginLeft: 6, ...(isRating ? { cursor: "help", borderBottom: "1px dotted #444" } : {}) }}>{detail}</span>;
      })()}
    </span>
  </div>;
}
function CapSR({ label, value, cap, curve, bonus }) {
  const capped = value >= cap - 0.0001;
  const parts = [];
  if (capped) {
    parts.push("capped");
    if (bonus > 0.0001) {
      const eff = Math.max(0, cap - curve);
      parts.push(`${fmtPct(bonus)} from bonuses (${fmtPct(eff)} applied)`);
      if (bonus - eff > 0.0001) parts.push(`${fmtPct(bonus - eff)} over cap`);
    }
  } else if (bonus > 0.0001) parts.push(`${fmtPct(bonus)} from bonuses`);
  return <SR label={label} value={fmtPct(value)} detail={parts.length ? parts.join(" · ") : null} />;
}

    // Mount the app
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
