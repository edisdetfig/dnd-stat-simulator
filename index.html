// Sorted stat options for dropdowns, grouped by category
const STAT_OPTIONS = (() => {
  const cats = { attr: "— Attributes —", offense: "— Offensive —", defense: "— Defensive —", utility: "— Utility —" };
  const groups = {};
  for (const [id, meta] of Object.entries(STAT_META)) {
    if (meta.cat === "weapon") continue; // weapon props have dedicated fields
    if (!groups[meta.cat]) groups[meta.cat] = [];
    groups[meta.cat].push({ id, label: meta.label });
  }
  const result = [];
  for (const [cat, heading] of Object.entries(cats)) {
    if (groups[cat]) {
      result.push({ id: `__header_${cat}`, label: heading, disabled: true });
      groups[cat].sort((a, b) => a.label.localeCompare(b.label));
      result.push(...groups[cat]);
    }
  }
  return result;
})();

// Convert display value to internal value and vice versa
function displayToInternal(statId, displayVal) {
  const meta = STAT_META[statId];
  if (!meta) return displayVal;
  return meta.unit === "percent" ? displayVal / 100 : displayVal;
}
function internalToDisplay(statId, internalVal) {
  const meta = STAT_META[statId];
  if (!meta) return internalVal;
  return meta.unit === "percent" ? internalVal * 100 : internalVal;
}
function statDisplaySuffix(statId) {
  const meta = STAT_META[statId];
  return meta && meta.unit === "percent" ? "%" : "";
}

// ============================================================
// CORE ENGINE — unchanged from Phase 1
// ============================================================

function evaluateCurve(curveDef, inputValue) {
  const { segments, lowerLimit, upperLimit } = curveDef;
  const v = Math.max(segments[0].start, Math.min(segments[segments.length - 1].end, inputValue));
  let seg = segments[segments.length - 1];
  for (let i = 0; i < segments.length; i++) {
    if (v >= segments[i].start && v < segments[i].end) { seg = segments[i]; break; }
    if (i === segments.length - 1 && v === segments[i].end) seg = segments[i];
  }
  let r = seg.startValue + seg.slope * (v - seg.start);
  if (lowerLimit != null) r = Math.max(lowerLimit, r);
  if (upperLimit != null) r = Math.min(upperLimit, r);
  return r;
}

// ============================================================
// GEAR AGGREGATOR — unchanged from Phase 1
// ============================================================

const ARMOR_SLOTS = ["head", "chest", "back", "hands", "legs", "feet", "ring1", "ring2", "necklace"];
const WEAPON_ONLY = new Set(["additionalWeaponDamage"]);

function aggregateGear(classData, gear, weaponHeldState) {
  const attrs = { ...classData.baseStats };
  const bonuses = {};

  function addItem(item) {
    if (!item) return;
    for (const { stat, value } of [...(item.inherentStats || []), ...(item.modifiers || [])]) {
      if (WEAPON_ONLY.has(stat)) continue;
      if (CORE_ATTRS.has(stat)) attrs[stat] = (attrs[stat] || 0) + value;
      else bonuses[stat] = (bonuses[stat] || 0) + value;
    }
  }

  for (const slot of ARMOR_SLOTS) addItem(gear[slot]);

  let activeWeapon = null;
  if (weaponHeldState !== "none" && gear[weaponHeldState]) {
    const ws = gear[weaponHeldState];
    addItem(ws.primary);
    addItem(ws.secondary);
    activeWeapon = ws.primary;
  }

  return { attrs, bonuses, activeWeapon };
}

// ============================================================
// DERIVED STAT PIPELINE — unchanged from Phase 1
// ============================================================

function computeDerivedStats(attrs, bonuses, perkEffects) {
  const s = {};
  const C = CONSTANTS;

  s.physicalPower = attrs.str + (bonuses.physicalPower || 0);
  s.ppbFromCurve = evaluateCurve(STAT_CURVES.physicalPowerBonus, s.physicalPower);
  s.ppbFromBonuses = bonuses.physicalDamageBonus || 0;
  s.ppb = s.ppbFromCurve + s.ppbFromBonuses;

  s.magicalPower = attrs.wil + (bonuses.magicalPower || 0);
  s.mpbFromCurve = evaluateCurve(STAT_CURVES.magicPowerBonus, s.magicalPower);
  s.mpbFromBonuses = bonuses.magicalDamageBonus || 0;
  s.mpb = s.mpbFromCurve + s.mpbFromBonuses;

  s.healthRating = attrs.str * 0.25 + attrs.vig * 0.75;
  s.health = Math.ceil(evaluateCurve(STAT_CURVES.health, s.healthRating)) + (bonuses.maxHealth || 0);

  s.actionSpeedRating = attrs.agi * 0.25 + attrs.dex * 0.75;
  s.actionSpeed = evaluateCurve(STAT_CURVES.actionSpeed, s.actionSpeedRating) + (bonuses.actionSpeed || 0);

  s.moveSpeed = Math.min(C.MOVE_SPEED_CAP,
    C.BASE_MOVE_SPEED + evaluateCurve(STAT_CURVES.moveSpeed, attrs.agi) + (bonuses.moveSpeed || 0));

  s.armorRating = (bonuses.armorRating || 0) + (bonuses.additionalArmorRating || 0);
  s.pdrFromCurve = evaluateCurve(STAT_CURVES.armorRatingToPDR, s.armorRating);
  s.pdrFromBonuses = bonuses.physicalDamageReduction || 0;
  s.pdrCap = perkEffects.fighterDefenseMastery ? C.PDR_CAP_FIGHTER : C.PDR_CAP;
  s.pdr = Math.min(s.pdrCap, s.pdrFromCurve + s.pdrFromBonuses);

  s.magicResistance = evaluateCurve(STAT_CURVES.willToMagicResistance, attrs.wil) + (bonuses.magicResistance || 0);
  s.mdrFromCurve = evaluateCurve(STAT_CURVES.magicResistanceToMDR, s.magicResistance);
  s.mdrFromBonuses = bonuses.magicalDamageReduction || 0;
  s.mdrCap = perkEffects.barbarianIronWill ? C.MDR_CAP_BARBARIAN : C.MDR_CAP;
  s.mdr = Math.min(s.mdrCap, s.mdrFromCurve + s.mdrFromBonuses);

  s.hasAntimagic = !!perkEffects.antimagic;
  s.effectiveMagicDmgTaken = s.hasAntimagic ? (1 - s.mdr) * (1 - C.ANTIMAGIC) : (1 - s.mdr);

  s.buffDuration = evaluateCurve(STAT_CURVES.buffDuration, attrs.wil) + (bonuses.buffDurationBonus || 0);
  s.debuffDuration = evaluateCurve(STAT_CURVES.debuffDuration, attrs.wil);
  s.cdr = Math.min(C.CDR_CAP, evaluateCurve(STAT_CURVES.cooldownReduction, attrs.res) + (bonuses.cooldownReductionBonus || 0));
  s.spellCastingSpeed = evaluateCurve(STAT_CURVES.spellCastingSpeed, attrs.kno) + (perkEffects.spellCastingSpeedBonus || 0);

  const rawMem = evaluateCurve(STAT_CURVES.memoryCapacity, attrs.kno);
  s.memoryCapacity = Math.ceil(rawMem * (1 + (bonuses.memoryCapacityBonus || 0))) + (bonuses.additionalMemoryCapacity || 0);

  s.healthRecovery = evaluateCurve(STAT_CURVES.healthRecovery, attrs.vig);
  s.memoryRecovery = evaluateCurve(STAT_CURVES.memoryRecovery, attrs.kno);
  s.persuasiveness = evaluateCurve(STAT_CURVES.persuasiveness, attrs.res);

  const risRating = attrs.dex * 0.25 + attrs.res * 0.75;
  s.regularInteractionSpeed = evaluateCurve(STAT_CURVES.regularInteractionSpeed, risRating);
  s.magicalInteractionSpeed = evaluateCurve(STAT_CURVES.magicalInteractionSpeed, attrs.wil);
  s.manualDexterity = Math.min(C.MANUAL_DEX_CAP, evaluateCurve(STAT_CURVES.manualDexterity, attrs.dex));
  s.equipSpeed = evaluateCurve(STAT_CURVES.itemEquipSpeed, attrs.dex);

  s.armorPenetration = bonuses.armorPenetration || 0;
  s.magicPenetration = bonuses.magicPenetration || 0;
  s.headshotDamageBonus = bonuses.headshotDamageBonus || 0;
  s.projectileDamageReduction = bonuses.projectileDamageReduction || 0;
  s.headshotDamageReduction = bonuses.headshotDamageReduction || 0;

  return s;
}

// ============================================================
// DAMAGE CALCULATORS — from Phase 1 original
// ============================================================

function calcPhysicalMeleeDamage({ baseWeaponDmg, buffWeaponDmg = 0, comboMultiplier = 1.0,
  impactZone = 1.0, gearWeaponDmg = 0, ppb, additionalPhysicalDmg = 0, hitLocation = "body",
  headshotBonus = 0, targetHeadshotDR = 0, targetPDR, attackerPen = 0, projectileReduction = 0, truePhysicalDmg = 0 }) {
  const C = CONSTANTS;
  let hlm = 1.0;
  if (hitLocation === "head") hlm = 1.0 + C.HS_BASE_MULT + headshotBonus - targetHeadshotDR;
  else if (hitLocation === "limb") hlm = C.LIMB_MULT;
  const dr = Math.max(1 - targetPDR * (1 - attackerPen), 1 - targetPDR);
  const base = (baseWeaponDmg + buffWeaponDmg) * comboMultiplier * impactZone + gearWeaponDmg;
  return Math.floor((base * (1 + ppb) + additionalPhysicalDmg) * hlm * dr * (1 - projectileReduction) + truePhysicalDmg);
}

function calcSpellDamage({ baseDamage, scaling, mpb, hitLocation = "body", affectedByHitLocation = true,
  headshotBonus = 0, targetHeadshotDR = 0, targetMDR, attackerMagicPen = 0, typeBonuses = 0 }) {
  const C = CONSTANTS;
  let hlm = 1.0;
  if (affectedByHitLocation) {
    if (hitLocation === "head") hlm = 1.0 + C.HS_BASE_MULT + headshotBonus - targetHeadshotDR;
    else if (hitLocation === "limb") hlm = C.LIMB_MULT;
  }
  const dr = Math.max(1 - targetMDR * (1 - attackerMagicPen), 1 - targetMDR);
  return Math.floor(baseDamage * (1 + mpb * scaling + typeBonuses) * hlm * dr);
}

          step="any"
          value={displayStr}
          onChange={(e) => {
            const raw = parseFloat(e.target.value);
            if (isNaN(raw)) return;
            onChange({ stat, value: meta && meta.unit === "percent" ? raw / 100 : raw });
          }}
          style={{ ...styles.numInput, paddingRight: meta?.unit === "percent" ? 20 : 8 }}
        />
        {meta?.unit === "percent" && (
          <span style={{ position: "absolute", right: 6, color: "#555", fontSize: 10, pointerEvents: "none" }}>%</span>
        )}
      </div>
      <button onClick={onRemove} style={styles.removeBtn} title="Remove">×</button>
    </div>
  );
}

function StatSection({ title, stats, onChange, color }) {
  const addStat = () => {
    onChange([...stats, { stat: "", value: 0 }]);
  };
  const removeStat = (idx) => {
    onChange(stats.filter((_, i) => i !== idx));
  };
  const updateStat = (idx, updated) => {
    const newStats = [...stats];
    // If stat changed, convert value for new stat's unit
    if (updated.stat !== newStats[idx].stat) {
      const oldMeta = STAT_META[newStats[idx].stat];
      const newMeta = STAT_META[updated.stat];
      // Reset value to 0 when switching stat types
      if (oldMeta?.unit !== newMeta?.unit) {
        updated.value = 0;
      }
    }
    newStats[idx] = updated;
    onChange(newStats);
  };

  return (
    <div style={{ marginBottom: 8 }}>
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 4 }}>
        <span style={{ fontSize: 10, color: color || "#666", textTransform: "uppercase", letterSpacing: "0.1em", fontWeight: 600 }}>{title}</span>
        <button onClick={addStat} style={styles.addBtn}>+ Add</button>
      </div>
      {stats.length === 0 && (
        <div style={{ fontSize: 10, color: "#333", fontStyle: "italic", padding: "2px 0" }}>None</div>
      )}
      {stats.map((s, i) => (
        <StatRow key={i} stat={s.stat} value={s.value} onChange={(u) => updateStat(i, u)} onRemove={() => removeStat(i)} />
      ))}
    </div>
  );
}

function WeaponEditor({ weapon, onChange }) {
  if (!weapon) return null;

  const updateField = (field, value) => {
    onChange({ ...weapon, [field]: value });
  };

  return (
    <div>
      <div style={{ display: "flex", gap: 8, marginBottom: 8, flexWrap: "wrap", alignItems: "center" }}>

          onChange={(e) => {

function GearSlot({ slotDef, gear, onGearChange }) {
  const [expanded, setExpanded] = useState(false);
  const slotData = gear[slotDef.key];
  const item = slotDef.isWeapon ? slotData?.primary : slotData;
  const itemName = item?.name || "(empty)";
  const rarity = item?.rarity || "common";
  const modCount = item?.modifiers?.length || 0;
  const inherentCount = item?.inherentStats?.length || 0;

  const handleChange = (updated) => {
    if (slotDef.isWeapon) {
      onGearChange(slotDef.key, { ...slotData, primary: updated });
    } else {
      onGearChange(slotDef.key, updated);
    }
  };

  const handleClear = () => {
    if (slotDef.isWeapon) {
      onGearChange(slotDef.key, { primary: null, secondary: null });
    } else {
      onGearChange(slotDef.key, null);
    }
  };

  const handleCreate = () => {
    const newItem = { id: "", name: "", rarity: "epic", inherentStats: [], modifiers: [] };
    if (slotDef.isWeapon) {
      newItem.handType = "twoHanded";
      newItem.weaponDamage = 0;
      onGearChange(slotDef.key, { primary: newItem, secondary: null });
    } else {
      onGearChange(slotDef.key, newItem);
    }
    setExpanded(true);
  };

  const isEmpty = !item;

  return (
    <div style={{
      border: `1px solid ${expanded ? "#2a2a3e" : "#1a1a28"}`,
      borderRadius: 6,
      marginBottom: 4,
      background: expanded ? "#0e0e18" : "#0b0b12",
      transition: "all 0.15s",
    }}>
      <div
        onClick={() => !isEmpty && setExpanded(!expanded)}
        style={{
          display: "flex", alignItems: "center", justifyContent: "space-between",
          padding: "8px 12px", cursor: isEmpty ? "default" : "pointer",
          borderBottom: expanded ? "1px solid #1a1a28" : "none",
        }}
      >
        <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
          <span style={{ fontSize: 10, color: "#444", width: 80, flexShrink: 0, textTransform: "uppercase", letterSpacing: "0.08em" }}>{slotDef.label}</span>
          {!isEmpty ? (
            <span style={{ fontSize: 12, color: RARITY_CONFIG[rarity]?.color || "#c8c8d4" }}>{itemName}</span>
          ) : (
            <button onClick={handleCreate} style={{ ...styles.addBtn, fontSize: 10 }}>+ Equip Item</button>
          )}
        </div>
        {!isEmpty && (
          <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
            <span style={{ fontSize: 9, color: "#444" }}>{inherentCount}inh · {modCount}mod</span>
            <span style={{ fontSize: 10, color: "#444" }}>{expanded ? "▼" : "▶"}</span>
          </div>
        )}
      </div>
      {expanded && !isEmpty && (
        <div style={{ padding: "8px 12px" }}>
          {slotDef.isWeapon ? (
            <WeaponEditor weapon={item} onChange={handleChange} />
          ) : (
            <ArmorEditor item={item} onChange={handleChange} />
          )}
          <div style={{ borderTop: "1px solid #1a1a28", paddingTop: 6, marginTop: 6 }}>
            <button onClick={handleClear} style={{ ...styles.removeBtn, fontSize: 10, padding: "2px 8px", width: "auto" }}>Remove Item</button>
          </div>
        </div>
      )}
    </div>
  );
}

function App() {
  const [showTests, setShowTests] = useState(null);
  const [weapon, setWeapon] = useState("none");
  const [showDebug, setShowDebug] = useState(false);
  const [gear, setGear] = useState(makeDefaultGear);
  const [gearCollapsed, setGearCollapsed] = useState(false);

  const tests = useMemo(() => runTests(), []);
  const pc = tests.filter(t => t.status === "PASS").length;
  const fc = tests.filter(t => t.status === "FAIL").length;

  const handleGearChange = useCallback((slot, data) => {
    setGear(prev => ({ ...prev, [slot]: data }));
  }, []);

  const computed = useMemo(() => {
    const { attrs, bonuses, activeWeapon } = aggregateGear(WARLOCK, gear, weapon);
    const pe = { antimagic: ACTIVE_PERKS.antimagic, spellCastingSpeedBonus: ACTIVE_PERKS.demonArmor ? -0.10 : 0 };
    return { attrs, bonuses, ds: computeDerivedStats(attrs, bonuses, pe), activeWeapon };
  }, [weapon, gear]);

  const { ds } = computed;

  return (
    <div style={{ fontFamily: "'JetBrains Mono', monospace", background: "#0a0a0f", color: "#c8c8d4", minHeight: "100vh", padding: 20, maxWidth: 1100, margin: "0 auto" }}>
      <style>{`@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap');
        * { box-sizing: border-box; margin: 0; padding: 0; } body { background: #0a0a0f; }
        input[type=number]::-webkit-inner-spin-button, input[type=number]::-webkit-outer-spin-button { opacity: 1; }
        select option:disabled { color: #666; font-weight: 600; background: #0a0a0f; }
      `}</style>

      <div style={{ borderBottom: "1px solid #1e1e2e", paddingBottom: 16, marginBottom: 24 }}>
        <h1 style={{ fontSize: 18, fontWeight: 600, color: "#e0e0ec", letterSpacing: "0.05em", textTransform: "uppercase" }}>D&D Simulator — Phase 2</h1>
        <div style={{ fontSize: 11, color: "#666", marginTop: 4 }}>Patch 6.10 · Season 8 · Editable Gear · {ALL_SLOTS.length} gear slots</div>
      </div>

      {/* Test Banner */}
      <div style={{ background: fc > 0 ? "#1a0a0a" : "#0a1a0a", border: `1px solid ${fc > 0 ? "#4a1515" : "#154a15"}`, borderRadius: 6, padding: "12px 16px", marginBottom: 20, display: "flex", alignItems: "center", justifyContent: "space-between" }}>
        <span style={{ color: fc > 0 ? "#ff6b6b" : "#6bff6b", fontWeight: 600 }}>{fc > 0 ? "⚠" : "✓"} {pc}/{tests.length} tests{fc > 0 ? ` (${fc} failed)` : ""}</span>
        <button onClick={() => setShowTests(showTests ? null : tests)} style={{ background: "none", border: "1px solid #333", color: "#888", padding: "4px 12px", borderRadius: 4, cursor: "pointer", fontFamily: "inherit", fontSize: 11 }}>{showTests ? "Hide" : "Show"}</button>
      </div>
      {showTests && (
        <div style={{ background: "#0d0d14", border: "1px solid #1e1e2e", borderRadius: 6, padding: 12, marginBottom: 20, maxHeight: 300, overflowY: "auto", fontSize: 11 }}>
          {showTests.map((t, i) => <div key={i} style={{ padding: "3px 0", color: t.status === "PASS" ? "#4a8" : "#f66" }}>{t.status === "PASS" ? "✓" : "✗"} {t.name}{t.status === "FAIL" && <span style={{ color: "#a66" }}> — exp {t.expected}, got {t.got}</span>}</div>)}
        </div>
      )}

      {/* Weapon Held State */}
      <div style={{ marginBottom: 20 }}>
        <div style={{ fontSize: 11, color: "#666", marginBottom: 8, textTransform: "uppercase", letterSpacing: "0.1em" }}>Weapon Held</div>
        <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
          {[
            ["none", "Bare Hands"],
            ["weaponSlot1", gear.weaponSlot1?.primary?.name || "Weapon 1"],
            ["weaponSlot2", gear.weaponSlot2?.primary?.name || "Weapon 2"],
          ].map(([k, l]) => (
            <button key={k} onClick={() => setWeapon(k)} style={{
              background: weapon === k ? "#1a1a2e" : "transparent",
              border: `1px solid ${weapon === k ? "#4a4a6e" : "#1e1e2e"}`,
              color: weapon === k ? "#e0e0ec" : "#666",
              padding: "8px 16px", borderRadius: 4, cursor: "pointer",
              fontFamily: "inherit", fontSize: 12, fontWeight: weapon === k ? 600 : 400
            }}>{l}</button>
          ))}
        </div>
      </div>

      {/* Gear Editor */}
      <Sec
        title={
          <span style={{ display: "flex", alignItems: "center", justifyContent: "space-between", width: "100%" }}>
            <span>Equipment</span>
            <button
              onClick={() => setGearCollapsed(!gearCollapsed)}
              style={{ background: "none", border: "1px solid #1e1e2e", color: "#555", padding: "2px 8px", borderRadius: 3, cursor: "pointer", fontFamily: "inherit", fontSize: 9, textTransform: "none", letterSpacing: 0 }}
            >
              {gearCollapsed ? "Expand" : "Collapse"}
            </button>
          </span>
        }
      >
        {!gearCollapsed && ALL_SLOTS.map(s => (
          <GearSlot key={s.key} slotDef={s} gear={gear} onGearChange={handleGearChange} />
        ))}
        {gearCollapsed && (
          <div style={{ fontSize: 10, color: "#444", padding: "4px 0" }}>
            {ALL_SLOTS.map(s => {
              const item = s.isWeapon ? gear[s.key]?.primary : gear[s.key];
              return item ? item.name : null;
            }).filter(Boolean).join(" · ")}
          </div>
        )}
      </Sec>

      {/* Core Attributes */}
      <Sec title="Core Attributes"><SG>{["str", "vig", "agi", "dex", "wil", "kno", "res"].map(a => <SR key={a} label={a.toUpperCase()} value={computed.attrs[a]} base={WARLOCK.baseStats[a]} />)}</SG></Sec>

      {/* Derived Stats — grouped to match in-game stat screen order */}
      <Sec title="Derived Stats">
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "0 24px" }}>
          {/* LEFT COLUMN */}
          <div>
            {/* Health */}
            <SR label="Health" value={ds.health} detail={`rating ${ds.healthRating.toFixed(1)}`} />
            <StatDivider />

            {/* Memory */}
            <SR label="Memory Capacity" value={ds.memoryCapacity} />
            <StatDivider />

            {/* Recovery */}
            <SR label="Health Recovery Bonus" value={fmtPct(ds.healthRecovery)} />
            <SR label="Spell Recovery Bonus" value={fmtPct(ds.memoryRecovery)} />
            <StatDivider />

            {/* Speed */}
            <SR label="Move Speed" value={ds.moveSpeed} />
            <SR label="Action Speed" value={fmtPct(ds.actionSpeed)} detail={`rating ${ds.actionSpeedRating.toFixed(1)}`} />
            <SR label="Manual Dexterity" value={fmtPct(ds.manualDexterity)} />
            <SR label="Spell Casting Speed" value={fmtPct(ds.spellCastingSpeed)} />
            <SR label="Equip Speed" value={fmtPct(ds.equipSpeed)} />
            <SR label="Regular Interaction Spd" value={fmtPct(ds.regularInteractionSpeed)} />
            <SR label="Magical Interaction Spd" value={fmtPct(ds.magicalInteractionSpeed)} />
            <StatDivider />

            {/* Duration */}
            <SR label="Persuasiveness" value={Math.round(ds.persuasiveness)} />
            <SR label="Buff Duration" value={fmtPct(ds.buffDuration)} />
            <SR label="Debuff Duration" value={fmtPct(ds.debuffDuration)} />
            <SR label="Cooldown Reduction Bonus" value={fmtPct(ds.cdr)} />
            <StatDivider />

            {/* Penetration */}
            <SR label="Armor Penetration" value={fmtPct(ds.armorPenetration)} />
            <SR label="Magic Penetration" value={fmtPct(ds.magicPenetration)} />
          </div>

          {/* RIGHT COLUMN — detailed breakdowns */}
          <div>
            {/* Headshot / Projectile DR */}
            <SR label="Headshot Damage Reduction" value={fmtPct(ds.headshotDamageReduction)} />
            <SR label="Projectile Damage Reduction" value={fmtPct(ds.projectileDamageReduction)} />
            <StatDivider />

            {/* PDR breakdown */}
            <CapSR label="Physical Damage Reduction" value={ds.pdr} cap={ds.pdrCap} curve={ds.pdrFromCurve} bonus={ds.pdrFromBonuses} />
            <SubSR label="From Armor Rating" value={`${ds.armorRating} (${fmtPct(ds.pdrFromCurve)})`} />
            <SubSR label="From Bonuses" value={ds.pdrFromBonuses > 0 ? fmtPct(ds.pdrFromBonuses) : "0"} />
            <StatDivider />

            {/* MDR breakdown */}
            <CapSR label="Magical Damage Reduction" value={ds.mdr} cap={ds.mdrCap} curve={ds.mdrFromCurve} bonus={ds.mdrFromBonuses} />
            <SubSR label="From Magic Resistance" value={`${Math.round(ds.magicResistance)} (${fmtPct(ds.mdrFromCurve)})`} />
            <SubSR label="From Bonuses" value={ds.mdrFromBonuses > 0 ? fmtPct(ds.mdrFromBonuses) : "0"} />
            {ds.hasAntimagic && <SubSR label="Antimagic (×0.80)" value={fmtPct(1 - ds.effectiveMagicDmgTaken)} />}
            <StatDivider />

            {/* PPB breakdown */}
            <SR label="Physical Power Bonus" value={fmtPct(ds.ppb)} />
            <SubSR label="From Physical Power" value={`${ds.physicalPower} (${fmtPct(ds.ppbFromCurve)})`} />
            <SubSR label="From Bonuses" value={ds.ppbFromBonuses > 0 ? fmtPct(ds.ppbFromBonuses) : "0"} />
            <StatDivider />

            {/* MPB breakdown */}
            <SR label="Magic Power Bonus" value={fmtPct(ds.mpb)} />
            <SubSR label="From Magical Power" value={`${ds.magicalPower} (${fmtPct(ds.mpbFromCurve)})`} />
            <SubSR label="From Bonuses" value={ds.mpbFromBonuses > 0 ? fmtPct(ds.mpbFromBonuses) : "0"} />
            <StatDivider />

            {/* Headshot Damage Bonus */}
            <SR label="Headshot Damage Bonus" value={fmtPct(ds.headshotDamageBonus)} />
          </div>
        </div>
      </Sec>

      {/* Damage Section */}
      {computed.activeWeapon && (
        <Sec title="Damage (vs Dummy: PDR -22%, MDR 6%)"><SG>
          {(() => {
            const w = computed.activeWeapon;
            const gearWpnDmg = computed.bonuses.additionalWeaponDamage || 0;
            const pen = ds.armorPenetration;
            const hsBonus = ds.headshotDamageBonus;
            const rows = [];
            const combos = [1.0, 1.05, 1.1];
            for (let i = 0; i < combos.length; i++) {
              const d = calcPhysicalMeleeDamage({ baseWeaponDmg: w.weaponDamage, gearWeaponDmg: gearWpnDmg, ppb: ds.ppb, comboMultiplier: combos[i], targetPDR: -0.22, attackerPen: pen });
              rows.push(<SR key={`hit${i+1}`} label={`Hit ${i+1} (body)`} value={d} detail={`×${combos[i]}`} />);
            }
            const dHead = calcPhysicalMeleeDamage({ baseWeaponDmg: w.weaponDamage, gearWeaponDmg: gearWpnDmg, ppb: ds.ppb, comboMultiplier: 1.0, targetPDR: -0.22, attackerPen: pen, hitLocation: "head", headshotBonus: hsBonus });
            rows.push(<SR key="head1" label="Hit 1 (head)" value={dHead} />);
            return rows;
          })()}
        </SG></Sec>
      )}

      {/* Debug */}
      <div style={{ marginTop: 20 }}>
        <button onClick={() => setShowDebug(!showDebug)} style={{ background: "none", border: "1px solid #1e1e2e", color: "#555", padding: "4px 12px", borderRadius: 4, cursor: "pointer", fontFamily: "inherit", fontSize: 11 }}>{showDebug ? "Hide" : "Show"} Debug</button>
        {showDebug && <pre style={{ marginTop: 12, background: "#0d0d14", border: "1px solid #1e1e2e", borderRadius: 6, padding: 12, fontSize: 10, overflow: "auto", maxHeight: 400, color: "#888" }}>{JSON.stringify({ attrs: computed.attrs, bonuses: computed.bonuses, derived: ds }, null, 2)}</pre>}
      </div>

      <div style={{ marginTop: 40, padding: "16px 0", borderTop: "1px solid #1e1e2e", fontSize: 10, color: "#444" }}>Phase 2 · {tests.length} tests · Editable gear from {ALL_SLOTS.filter(s => { const item = s.isWeapon ? gear[s.key]?.primary : gear[s.key]; return !!item; }).length} equipped items</div>
    </div>
  );
}

}

  return <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(240px, 1fr))", gap: "2px 16px" }}>{children}</div>;
}
function SR({ label, value, base, detail }) {
  return <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", padding: "4px 0", borderBottom: "1px solid #111118" }}>
    <span style={{ color: "#888", fontSize: 12 }}>{label}{base != null && <span style={{ color: "#444", fontSize: 10 }}> ({base})</span>}</span>
    <span style={{ color: "#e0e0ec", fontSize: 12, fontWeight: 500 }}>
      {value}
      {detail && (() => {
        const isRating = typeof detail === "string" && detail.startsWith("rating");
        return <span title={isRating ? "Intermediate value before curve — not shown in-game. Shows where you sit on the piecewise stat curve." : undefined}
          style={{ color: "#555", fontSize: 10, marginLeft: 6, ...(isRating ? { cursor: "help", borderBottom: "1px dotted #444" } : {}) }}>{detail}</span>;
      })()}
    </span>
  </div>;
}
function CapSR({ label, value, cap, curve, bonus }) {
  const capped = value >= cap - 0.0001;
  const parts = [];
  if (capped) {
    parts.push("capped");
    if (bonus > 0.0001) {
      const eff = Math.max(0, cap - curve);
      parts.push(`${fmtPct(bonus)} from bonuses (${fmtPct(eff)} applied)`);
      if (bonus - eff > 0.0001) parts.push(`${fmtPct(bonus - eff)} over cap`);
    }
  } else if (bonus > 0.0001) parts.push(`${fmtPct(bonus)} from bonuses`);
  return <SR label={label} value={fmtPct(value)} detail={parts.length ? parts.join(" · ") : null} />;
}
function SubSR({ label, value }) {
  return <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", padding: "2px 0 2px 12px", borderBottom: "1px solid #111118" }}>
    <span style={{ color: "#555", fontSize: 11 }}>{label}</span>
    <span style={{ color: "#999", fontSize: 11 }}>{value}</span>
  </div>;
}
function StatDivider() {
  return <div style={{ borderBottom: "1px solid #1a1a28", margin: "6px 0" }} />;
}

// Mount
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
  </script>
