// Sorted stat options for dropdowns, grouped by category
const STAT_OPTIONS = (() => {
  const cats = { attr: "— Attributes —", offense: "— Offensive —", defense: "— Defensive —", utility: "— Utility —" };
  const groups = {};
  for (const [id, meta] of Object.entries(STAT_META)) {
    if (meta.cat === "weapon") continue;
    if (!groups[meta.cat]) groups[meta.cat] = [];
    groups[meta.cat].push({ id, label: meta.label });
  }
  const result = [];
  for (const [cat, heading] of Object.entries(cats)) {
    if (groups[cat]) {
      result.push({ id: `__header_${cat}`, label: heading, disabled: true });
      groups[cat].sort((a, b) => a.label.localeCompare(b.label));
      result.push(...groups[cat]);
    }
  }
  return result;
})();

function displayToInternal(statId, displayVal) {
  const meta = STAT_META[statId];
  if (!meta) return displayVal;
  return meta.unit === "percent" ? displayVal / 100 : displayVal;
}
function internalToDisplay(statId, internalVal) {
  const meta = STAT_META[statId];
  if (!meta) return internalVal;
  return meta.unit === "percent" ? internalVal * 100 : internalVal;
}
function statDisplaySuffix(statId) {
  const meta = STAT_META[statId];
  return meta && meta.unit === "percent" ? "%" : "";
}

// ============================================================
// CORE ENGINE — copied exactly from Phase 2
// ============================================================

function evaluateCurve(curveDef, inputValue) {
  const { segments, lowerLimit, upperLimit } = curveDef;
  const v = Math.max(segments[0].start, Math.min(segments[segments.length - 1].end, inputValue));
  let seg = segments[segments.length - 1];
  for (let i = 0; i < segments.length; i++) {
    if (v >= segments[i].start && v < segments[i].end) { seg = segments[i]; break; }
    if (i === segments.length - 1 && v === segments[i].end) seg = segments[i];
  }
  let r = seg.startValue + seg.slope * (v - seg.start);
  if (lowerLimit != null) r = Math.max(lowerLimit, r);
  if (upperLimit != null) r = Math.min(upperLimit, r);
  return r;
}

// ============================================================
// GEAR AGGREGATOR — copied exactly from Phase 2
// ============================================================

const ARMOR_SLOTS = ["head", "chest", "back", "hands", "legs", "feet", "ring1", "ring2", "necklace"];
const WEAPON_ONLY = new Set(["additionalWeaponDamage"]);

function aggregateGear(classData, gear, weaponHeldState) {
  const attrs = { ...classData.baseStats };
  const bonuses = {};

  function addItem(item) {
    if (!item) return;
    for (const { stat, value } of [...(item.inherentStats || []), ...(item.modifiers || [])]) {
      if (WEAPON_ONLY.has(stat)) continue;
      if (CORE_ATTRS.has(stat)) attrs[stat] = (attrs[stat] || 0) + value;
      else bonuses[stat] = (bonuses[stat] || 0) + value;
    }
  }

  for (const slot of ARMOR_SLOTS) addItem(gear[slot]);

  let activeWeapon = null;
  if (weaponHeldState !== "none" && gear[weaponHeldState]) {
    const ws = gear[weaponHeldState];
    addItem(ws.primary);
    addItem(ws.secondary);
    activeWeapon = ws.primary;
  }

  return { attrs, bonuses, activeWeapon };
}

// ============================================================
// DERIVED STAT PIPELINE — copied exactly from Phase 2
// ============================================================

function computeDerivedStats(attrs, bonuses, perkEffects) {
  const s = {};
  const C = CONSTANTS;

  s.physicalPower = attrs.str + (bonuses.physicalPower || 0);
  s.ppbFromCurve = evaluateCurve(STAT_CURVES.physicalPowerBonus, s.physicalPower);
  s.ppbFromBonuses = bonuses.physicalDamageBonus || 0;
  s.ppb = s.ppbFromCurve + s.ppbFromBonuses;

  s.magicalPower = attrs.wil + (bonuses.magicalPower || 0);
  s.mpbFromCurve = evaluateCurve(STAT_CURVES.magicPowerBonus, s.magicalPower);
  s.mpbFromBonuses = bonuses.magicalDamageBonus || 0;
  s.mpb = s.mpbFromCurve + s.mpbFromBonuses;

  s.healthRating = attrs.str * 0.25 + attrs.vig * 0.75;
  s.health = Math.ceil(evaluateCurve(STAT_CURVES.health, s.healthRating)) + (bonuses.maxHealth || 0);

  s.actionSpeedRating = attrs.agi * 0.25 + attrs.dex * 0.75;
  s.actionSpeed = evaluateCurve(STAT_CURVES.actionSpeed, s.actionSpeedRating) + (bonuses.actionSpeed || 0);

  s.moveSpeed = Math.min(C.MOVE_SPEED_CAP,
    C.BASE_MOVE_SPEED + evaluateCurve(STAT_CURVES.moveSpeed, attrs.agi) + (bonuses.moveSpeed || 0));

  s.armorRating = (bonuses.armorRating || 0) + (bonuses.additionalArmorRating || 0);
  s.pdrFromCurve = evaluateCurve(STAT_CURVES.armorRatingToPDR, s.armorRating);
  s.pdrFromBonuses = bonuses.physicalDamageReduction || 0;
  s.pdrCap = perkEffects.fighterDefenseMastery ? C.PDR_CAP_FIGHTER : C.PDR_CAP;
  s.pdr = Math.min(s.pdrCap, s.pdrFromCurve + s.pdrFromBonuses);

  s.magicResistance = evaluateCurve(STAT_CURVES.willToMagicResistance, attrs.wil) + (bonuses.magicResistance || 0);
  s.mdrFromCurve = evaluateCurve(STAT_CURVES.magicResistanceToMDR, s.magicResistance);
  s.mdrFromBonuses = bonuses.magicalDamageReduction || 0;
  s.mdrCap = perkEffects.barbarianIronWill ? C.MDR_CAP_BARBARIAN : C.MDR_CAP;
  s.mdr = Math.min(s.mdrCap, s.mdrFromCurve + s.mdrFromBonuses);

  s.hasAntimagic = !!perkEffects.antimagic;
  s.effectiveMagicDmgTaken = s.hasAntimagic ? (1 - s.mdr) * (1 - C.ANTIMAGIC) : (1 - s.mdr);

  s.buffDuration = evaluateCurve(STAT_CURVES.buffDuration, attrs.wil) + (bonuses.buffDurationBonus || 0);
  s.debuffDuration = evaluateCurve(STAT_CURVES.debuffDuration, attrs.wil);
  s.cdr = Math.min(C.CDR_CAP, evaluateCurve(STAT_CURVES.cooldownReduction, attrs.res) + (bonuses.cooldownReductionBonus || 0));
  s.spellCastingSpeed = evaluateCurve(STAT_CURVES.spellCastingSpeed, attrs.kno) + (perkEffects.spellCastingSpeedBonus || 0);

  const rawMem = evaluateCurve(STAT_CURVES.memoryCapacity, attrs.kno);
  s.memoryCapacity = Math.ceil(rawMem * (1 + (bonuses.memoryCapacityBonus || 0))) + (bonuses.additionalMemoryCapacity || 0);

  s.healthRecovery = evaluateCurve(STAT_CURVES.healthRecovery, attrs.vig);
  s.memoryRecovery = evaluateCurve(STAT_CURVES.memoryRecovery, attrs.kno);
  s.persuasiveness = evaluateCurve(STAT_CURVES.persuasiveness, attrs.res);

  const risRating = attrs.dex * 0.25 + attrs.res * 0.75;
  s.regularInteractionSpeed = evaluateCurve(STAT_CURVES.regularInteractionSpeed, risRating);
  s.magicalInteractionSpeed = evaluateCurve(STAT_CURVES.magicalInteractionSpeed, attrs.wil);
  s.manualDexterity = Math.min(C.MANUAL_DEX_CAP, evaluateCurve(STAT_CURVES.manualDexterity, attrs.dex));
  s.equipSpeed = evaluateCurve(STAT_CURVES.itemEquipSpeed, attrs.dex);

  s.armorPenetration = bonuses.armorPenetration || 0;
  s.magicPenetration = bonuses.magicPenetration || 0;
  s.headshotDamageBonus = bonuses.headshotDamageBonus || 0;
  s.projectileDamageReduction = bonuses.projectileDamageReduction || 0;
  s.headshotDamageReduction = bonuses.headshotDamageReduction || 0;

  return s;
}

// ============================================================
// DAMAGE CALCULATORS — copied exactly from Phase 2
// ============================================================

function calcPhysicalMeleeDamage({ baseWeaponDmg, buffWeaponDmg = 0, comboMultiplier = 1.0,
  impactZone = 1.0, gearWeaponDmg = 0, ppb, additionalPhysicalDmg = 0, hitLocation = "body",
  headshotBonus = 0, targetHeadshotDR = 0, targetPDR, attackerPen = 0, projectileReduction = 0, truePhysicalDmg = 0 }) {
  const C = CONSTANTS;
  let hlm = 1.0;
  if (hitLocation === "head") hlm = 1.0 + C.HS_BASE_MULT + headshotBonus - targetHeadshotDR;
  else if (hitLocation === "limb") hlm = C.LIMB_MULT;
  const dr = Math.max(1 - targetPDR * (1 - attackerPen), 1 - targetPDR);
  const base = (baseWeaponDmg + buffWeaponDmg) * comboMultiplier * impactZone + gearWeaponDmg;
  return Math.floor((base * (1 + ppb) + additionalPhysicalDmg) * hlm * dr * (1 - projectileReduction) + truePhysicalDmg);
}

function calcSpellDamage({ baseDamage, scaling, mpb, hitLocation = "body", affectedByHitLocation = true,
  headshotBonus = 0, targetHeadshotDR = 0, targetMDR, attackerMagicPen = 0, typeBonuses = 0 }) {
  const C = CONSTANTS;
  let hlm = 1.0;
  if (affectedByHitLocation) {
    if (hitLocation === "head") hlm = 1.0 + C.HS_BASE_MULT + headshotBonus - targetHeadshotDR;
    else if (hitLocation === "limb") hlm = C.LIMB_MULT;
  }
  const dr = Math.max(1 - targetMDR * (1 - attackerMagicPen), 1 - targetMDR);
  return Math.floor(baseDamage * (1 + mpb * scaling + typeBonuses) * hlm * dr);
}

function computeAttrBreakdown(classData, gear, weaponHeldState, activeBuffs, availableBuffs) {
  const breakdown = {};
  for (const attr of ["str", "vig", "agi", "dex", "wil", "kno", "res"]) {
    breakdown[attr] = { base: classData.baseStats[attr], gearInherent: 0, gearMods: 0, buffs: [], total: 0 };
  }
  function scanItem(item) {
    if (!item) return;
    for (const { stat, value } of (item.inherentStats || [])) {
      if (CORE_ATTRS.has(stat)) breakdown[stat].gearInherent += value;
    }
    for (const { stat, value } of (item.modifiers || [])) {
      if (CORE_ATTRS.has(stat)) breakdown[stat].gearMods += value;
    }
  }
  for (const slot of ARMOR_SLOTS) scanItem(gear[slot]);
  if (weaponHeldState !== "none" && gear[weaponHeldState]) {
    const ws = gear[weaponHeldState];
    scanItem(ws.primary);
    scanItem(ws.secondary);
  }
  for (const buff of availableBuffs) {
    if (!activeBuffs[buff.id]) continue;
    for (const eff of buff.effects) {
      if (eff.phase === "pre" && CORE_ATTRS.has(eff.stat)) {
        breakdown[eff.stat].buffs.push({ name: buff.name, value: eff.value });
      }
    }
  }
  for (const attr of Object.keys(breakdown)) {
    const b = breakdown[attr];
    b.total = b.base + b.gearInherent + b.gearMods + b.buffs.reduce((s, x) => s + x.value, 0);
  }
  return breakdown;
}

function StatRowEditor({ stat, value, onChange, onRemove }) {
  const meta = STAT_META[stat];
  const displayVal = meta && meta.unit === "percent" ? (value * 100) : value;
  const displayStr = displayVal === 0 ? "0" : (Number.isInteger(displayVal) ? String(displayVal) : displayVal.toFixed(2).replace(/0+$/, '').replace(/\.$/, ''));

  return (
    <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 3 }}>
      <select value={stat} onChange={(e) => onChange({ stat: e.target.value, value })} style={styles.select}>
        <option value="">— select —</option>
        {STAT_OPTIONS.map(o => (
          <option key={o.id} value={o.id} disabled={o.disabled}>{o.label}</option>
        ))}
      </select>
      <div style={{ position: "relative", display: "flex", alignItems: "center" }}>
        <input type="number" step="any" value={displayStr}
          onChange={(e) => {
            const raw = parseFloat(e.target.value);
            if (isNaN(raw)) return;
            onChange({ stat, value: meta && meta.unit === "percent" ? raw / 100 : raw });
          }}
          style={{ ...styles.numInput, paddingRight: meta?.unit === "percent" ? 20 : 8 }} />
        {meta?.unit === "percent" && (
          <span style={{ position: "absolute", right: 6, color: "#555", fontSize: 10, pointerEvents: "none" }}>%</span>
        )}
      </div>
      <button onClick={onRemove} style={styles.removeBtn} title="Remove">×</button>
    </div>
  );
}

function StatSection({ title, stats, onChange, color }) {
  const addStat = () => onChange([...stats, { stat: "", value: 0 }]);
  const removeStat = (idx) => onChange(stats.filter((_, i) => i !== idx));
  const updateStat = (idx, updated) => {
    const newStats = [...stats];
    if (updated.stat !== newStats[idx].stat) {
      const oldMeta = STAT_META[newStats[idx].stat];
      const newMeta = STAT_META[updated.stat];
      if (oldMeta?.unit !== newMeta?.unit) updated.value = 0;
    }
    newStats[idx] = updated;
    onChange(newStats);
  };

  return (
    <div style={{ marginBottom: 8 }}>
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 4 }}>
        <span style={{ fontSize: 10, color: color || "#666", textTransform: "uppercase", letterSpacing: "0.1em", fontWeight: 600 }}>{title}</span>
        <button onClick={addStat} style={styles.addBtn}>+ Add</button>
      </div>
      {stats.length === 0 && <div style={{ fontSize: 10, color: "#333", fontStyle: "italic", padding: "2px 0" }}>None</div>}
      {stats.map((s, i) => (
        <StatRowEditor key={i} stat={s.stat} value={s.value} onChange={(u) => updateStat(i, u)} onRemove={() => removeStat(i)} />
      ))}
    </div>
  );
}

function GearSlot({ slotDef, gear, onGearChange }) {
  const [expanded, setExpanded] = useState(false);
  const slotData = gear[slotDef.key];
  const item = slotDef.isWeapon ? slotData?.primary : slotData;
  const itemName = item?.name || "(empty)";
  const rarity = item?.rarity || "common";
  const modCount = item?.modifiers?.length || 0;
  const inherentCount = item?.inherentStats?.length || 0;
  const isEmpty = !item;

  const handleChange = (updated) => {
    if (slotDef.isWeapon) onGearChange(slotDef.key, { ...slotData, primary: updated });
    else onGearChange(slotDef.key, updated);
  };
  const handleClear = () => {
    if (slotDef.isWeapon) onGearChange(slotDef.key, { primary: null, secondary: null });
    else onGearChange(slotDef.key, null);
  };
  const handleCreate = () => {
    const newItem = { id: "", name: "", rarity: "epic", inherentStats: [], modifiers: [] };
    if (slotDef.isWeapon) { newItem.handType = "twoHanded"; newItem.weaponDamage = 0; onGearChange(slotDef.key, { primary: newItem, secondary: null }); }
    else onGearChange(slotDef.key, newItem);
    setExpanded(true);
  };

  return (
    <div style={{ border: `1px solid ${expanded ? "#2a2a3e" : "#1a1a28"}`, borderRadius: 6, marginBottom: 4, background: expanded ? "#0e0e18" : "#0b0b12" }}>
      <div onClick={() => !isEmpty && setExpanded(!expanded)}
        style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "8px 12px", cursor: isEmpty ? "default" : "pointer", borderBottom: expanded ? "1px solid #1a1a28" : "none" }}>
        <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
          <span style={{ fontSize: 10, color: "#444", width: 80, flexShrink: 0, textTransform: "uppercase", letterSpacing: "0.08em" }}>{slotDef.label}</span>
          {!isEmpty ? <span style={{ fontSize: 12, color: RARITY_CONFIG[rarity]?.color || "#c8c8d4" }}>{itemName}</span>
            : <button onClick={handleCreate} style={{ ...styles.addBtn, fontSize: 10 }}>+ Equip Item</button>}
        </div>
        {!isEmpty && (
          <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
            <span style={{ fontSize: 9, color: "#444" }}>{inherentCount}inh · {modCount}mod</span>
            <span style={{ fontSize: 10, color: "#444" }}>{expanded ? "▼" : "▶"}</span>
          </div>
        )}
      </div>
      {expanded && !isEmpty && (
        <div style={{ padding: "8px 12px" }}>
          {slotDef.isWeapon ? <WeaponEditor weapon={item} onChange={handleChange} /> : <ArmorEditor item={item} onChange={handleChange} />}
          <div style={{ borderTop: "1px solid #1a1a28", paddingTop: 6, marginTop: 6 }}>
            <button onClick={handleClear} style={{ ...styles.removeBtn, fontSize: 10, padding: "2px 8px", width: "auto" }}>Remove Item</button>
          </div>
        </div>
      )}
    </div>
  );
}

function AttrTooltip({ children, breakdown, attrKey, className }) {
  const [show, setShow] = useState(false);
  const [pos, setPos] = useState({ x: 0, y: 0 });
  const bd = breakdown[attrKey];
  const handleEnter = (e) => {
    const r = e.currentTarget.getBoundingClientRect();
    setPos({ x: r.left, y: r.bottom + 4 });
    setShow(true);
  };
  return (
    <div onMouseEnter={handleEnter} onMouseLeave={() => setShow(false)} style={{ display: "inline-block" }}>
      {children}
      {show && (
        <div style={{ position: "fixed", left: pos.x, top: pos.y, zIndex: 999, background: "#16162a", border: "1px solid #4a4a6e", borderRadius: 6, padding: "8px 12px", minWidth: 200, boxShadow: "0 8px 24px rgba(0,0,0,0.6)", pointerEvents: "none", fontSize: 11, fontFamily: "'JetBrains Mono', monospace" }}>

          <div style={{ display: "flex", justifyContent: "space-between", color: bd.gearMods > 0 ? "#22d3ee" : "#555" }}><span>Gear (mods)</span><span style={{ color: bd.gearMods > 0 ? "#22d3ee" : "#555" }}>{bd.gearMods > 0 ? `+${bd.gearMods}` : "0"}</span></div>

        </div>
      )}
    </div>
  );
}

  return (
    <div>
      <div onClick={() => setOpen(!open)} style={{ display: "flex", alignItems: "center", gap: 6, cursor: "pointer", padding: "5px 0", userSelect: "none" }}>
        <span style={{ fontSize: 10, color: "#555", width: 12, textAlign: "center" }}>{open ? "▾" : "▸"}</span>
        <span style={{ fontSize: 12, fontWeight: 600, color: color || "#e0e0ec" }}>{title}</span>
        {badge != null && <span style={{ fontSize: 9, background: `${color || "#555"}25`, color: color || "#555", padding: "1px 6px", borderRadius: 10, marginLeft: "auto" }}>{badge}</span>}
      </div>
      {open && <div style={{ paddingLeft: 18 }}>{children}</div>}
    </div>
  );
}

// ============================================================
// DISPLAY COMPONENTS — SR, SubSR, CapSR, StatDivider, Panel
// ============================================================

function Panel({ title, color, children }) {
  return (
    <div style={{ background: "#0d0d14", border: "1px solid #1a1a28", borderRadius: 6, padding: 12, marginBottom: 8 }}>
      {title && <div style={{ fontSize: 10, fontWeight: 700, color: color || "#555", textTransform: "uppercase", letterSpacing: "0.15em", marginBottom: 8 }}>{title}</div>}
      {children}
    </div>
  );
}

function Sec({ title, children }) {
  return <div style={{ marginBottom: 12 }}><div style={{ fontSize: 11, color: "#555", textTransform: "uppercase", letterSpacing: "0.12em", marginBottom: 8, fontWeight: 600 }}>{title}</div><div style={{ background: "#0d0d14", border: "1px solid #1a1a28", borderRadius: 6, padding: 12 }}>{children}</div></div>;
}
function SG({ children }) {
  return <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(240px, 1fr))", gap: "2px 16px" }}>{children}</div>;
}
function SR({ label, value, base, detail }) {
  return <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", padding: "4px 0", borderBottom: "1px solid #111118" }}>
    <span style={{ color: "#888", fontSize: 12 }}>{label}{base != null && <span style={{ color: "#444", fontSize: 10 }}> ({base})</span>}</span>
    <span style={{ color: "#e0e0ec", fontSize: 12, fontWeight: 500 }}>
      {value}
      {detail && (() => {
        const isRating = typeof detail === "string" && detail.startsWith("rating");
        return <span title={isRating ? "Intermediate value before curve" : undefined}
          style={{ color: "#555", fontSize: 10, marginLeft: 6, ...(isRating ? { cursor: "help", borderBottom: "1px dotted #444" } : {}) }}>{detail}</span>;
      })()}
    </span>
  </div>;
}
function CapSR({ label, value, cap, curve, bonus }) {
  const capped = value >= cap - 0.0001;
  const parts = [];
  if (capped) {
    parts.push("capped");
    if (bonus > 0.0001) {
      const eff = Math.max(0, cap - curve);
      parts.push(`${fmtPct(bonus)} from bonuses (${fmtPct(eff)} applied)`);
      if (bonus - eff > 0.0001) parts.push(`${fmtPct(bonus - eff)} over cap`);
    }
  } else if (bonus > 0.0001) parts.push(`${fmtPct(bonus)} from bonuses`);
  return <SR label={label} value={fmtPct(value)} detail={parts.length ? parts.join(" · ") : null} />;
}
function SubSR({ label, value }) {
  return <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", padding: "2px 0 2px 12px", borderBottom: "1px solid #111118" }}>
    <span style={{ color: "#555", fontSize: 11 }}>{label}</span>
    <span style={{ color: "#999", fontSize: 11 }}>{value}</span>
  </div>;
}
function StatDivider() {
  return <div style={{ borderBottom: "1px solid #1a1a28", margin: "6px 0" }} />;
}

// ============================================================
// MAIN APP — v0.4.0 Layout Restructure
// ============================================================

function App() {
  const [showTests, setShowTests] = useState(null);
  const [weapon, setWeapon] = useState("none");
  const [showDebug, setShowDebug] = useState(false);
  const [gear, setGear] = useState(makeDefaultGear);
  const [gearCollapsed, setGearCollapsed] = useState(false);
  const [activeBuffs, setActiveBuffs] = useState({});
  const [religion, setReligion] = useState("none");
  const [useAcronyms, setUseAcronyms] = useState(true);

  const [selectedClass, setSelectedClass] = useState("warlock");
  const [selectedPerks, setSelectedPerks] = useState(["demon_armor", "shadow_touch", "dark_reflection"]);
  const [selectedSkills, setSelectedSkills] = useState(["spell_memory_1", "blow_of_corruption"]);
  const [selectedSpells, setSelectedSpells] = useState([
    "curse_of_weakness", "power_of_sacrifice", "bloodstained_blade", "eldritch_shield", "spell_predation"
  ]);

  const classData = CLASSES[selectedClass];

  const tests = useMemo(() => runTests(), []);
  const pc = tests.filter(t => t.status === "PASS").length;
  const fc = tests.filter(t => t.status === "FAIL").length;

  const handleGearChange = useCallback((slot, data) => setGear(prev => ({ ...prev, [slot]: data })), []);
  const toggleBuff = useCallback((buffId) => setActiveBuffs(prev => ({ ...prev, [buffId]: !prev[buffId] })), []);
  const togglePerk = useCallback((perkId) => {
    setSelectedPerks(prev => {
      if (prev.includes(perkId)) return prev.filter(p => p !== perkId);
      if (prev.length >= (classData?.maxPerks || 4)) return prev;
      return [...prev, perkId];
    });
  }, [classData]);
  const toggleSpell = useCallback((spellId) => {
    setSelectedSpells(prev => {
      if (prev.includes(spellId)) return prev.filter(s => s !== spellId);
      const smCount = selectedSkills.filter(sk => {
        const skDef = classData?.skills.find(s => s.id === sk);
        return skDef?.type === "spell_memory";
      }).length;
      if (prev.length >= smCount * 5) return prev;
      return [...prev, spellId];
    });
  }, [classData, selectedSkills]);
  const handleClassChange = useCallback((newClassId) => {
    setSelectedClass(newClassId);
    setSelectedPerks([]);
    setSelectedSkills([]);
    setSelectedSpells([]);
    setActiveBuffs({});
  }, []);
  const handleSkillChange = useCallback((slotIndex, skillId) => {
    setSelectedSkills(prev => {
      const next = [...prev];
      if (skillId === "") next.splice(slotIndex, 1);
      else if (slotIndex < next.length) next[slotIndex] = skillId;
      else next.push(skillId);
      return next;
    });
  }, []);

  const spellMemorySlots = useMemo(() => {
    return selectedSkills.filter(sk => {
      const skDef = classData?.skills.find(s => s.id === sk);
      return skDef?.type === "spell_memory";
    }).reduce((sum, sk) => {
      const skDef = classData?.skills.find(s => s.id === sk);
      return sum + (skDef?.spellSlots || 0);
    }, 0);
  }, [classData, selectedSkills]);

  const totalMemoryCost = useMemo(() => {
    return selectedSpells.reduce((sum, spId) => {
      const spDef = classData?.spells.find(s => s.id === spId);
      return sum + (spDef?.memoryCost || 0);
    }, 0);
  }, [classData, selectedSpells]);

  const availableBuffs = useMemo(() => {
    const buffs = CLASS_BUFFS[selectedClass] || [];
    return buffs.filter(b => !b.sourceSpell || selectedSpells.includes(b.sourceSpell));
  }, [selectedClass, selectedSpells]);

  const computed = useMemo(() => {
    const { attrs, bonuses, activeWeapon } = aggregateGear(classData, gear, weapon);

    for (const buff of availableBuffs) {
      if (!activeBuffs[buff.id]) continue;
      for (const eff of buff.effects) {
        if (eff.phase === "post") continue;
        if (CORE_ATTRS.has(eff.stat)) attrs[eff.stat] = (attrs[eff.stat] || 0) + eff.value;
        else bonuses[eff.stat] = (bonuses[eff.stat] || 0) + eff.value;
      }
    }

    const pe = {};
    const typeDmgBonuses = {};
    for (const perkId of selectedPerks) {
      const perkDef = classData.perks.find(p => p.id === perkId);
      if (!perkDef) continue;
      for (const eff of (perkDef.statEffects || [])) pe[eff.stat] = (pe[eff.stat] || 0) + eff.value;
      if (perkDef.perkFlags) {
        if (perkDef.perkFlags.typeDamageBonus) {
          for (const [type, val] of Object.entries(perkDef.perkFlags.typeDamageBonus)) typeDmgBonuses[type] = (typeDmgBonuses[type] || 0) + val;
        }
        const { typeDamageBonus, ...otherFlags } = perkDef.perkFlags;
        Object.assign(pe, otherFlags);
      }
    }

    const ds = computeDerivedStats(attrs, bonuses, pe);

    ds.buffPostCurve = {};
    for (const buff of availableBuffs) {
      if (!activeBuffs[buff.id]) continue;
      for (const eff of buff.effects) {
        if (eff.phase === "post") {
          ds.buffPostCurve[eff.stat] = (ds.buffPostCurve[eff.stat] || 0) + eff.value;
          ds[eff.stat] = (ds[eff.stat] || 0) + eff.value;
        } else if (eff.phase === "type_bonus") {
          typeDmgBonuses[eff.damageType] = (typeDmgBonuses[eff.damageType] || 0) + eff.value;
        }
      }
    }

    ds.typeDamageBonuses = typeDmgBonuses;

    ds.religionBonuses = {};
    const blessing = RELIGION_BLESSINGS.find(b => b.id === religion);
    if (blessing) {
      for (const eff of blessing.effects) {
        ds.religionBonuses[eff.stat] = eff.value;
        ds[eff.stat] = (ds[eff.stat] || 0) + eff.value;
      }
    }

    ds._perkFlags = pe;

    return { attrs, bonuses, ds, activeWeapon };
  }, [weapon, gear, activeBuffs, religion, selectedPerks, selectedClass, classData, availableBuffs]);

  const { ds } = computed;

  const attrBreakdown = useMemo(() =>
    computeAttrBreakdown(classData, gear, weapon, activeBuffs, availableBuffs),
    [classData, gear, weapon, activeBuffs, availableBuffs]
  );

  const majorStatIds = classData.majorDerivedStats || FALLBACK_MAJOR_STATS;
  const targetMDR = 0.075; // Dummy — VERIFIED 7.5%
  const magDmg = computed.activeWeapon?.magicalDamage || 0;

  // Helper: render a spell/skill damage line
  const renderDmgLine = (source, d, di) => {
    const effBase = d.base + (d.type !== "physical" ? magDmg : 0);
    const typeBonus = ds.typeDamageBonuses?.[d.type] || 0;
    const bodyDmg = calcSpellDamage({ baseDamage: effBase, scaling: d.scaling, mpb: ds.mpb, targetMDR, attackerMagicPen: ds.magicPenetration, typeBonuses: typeBonus, affectedByHitLocation: !!d.hitLoc });
    const headDmg = d.hitLoc ? calcSpellDamage({ baseDamage: effBase, scaling: d.scaling, mpb: ds.mpb, targetMDR, attackerMagicPen: ds.magicPenetration, typeBonuses: typeBonus, hitLocation: "head", affectedByHitLocation: true, headshotBonus: ds.headshotDamageBonus }) : null;
    return (
      <div key={`${source}-${di}`} style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", padding: "4px 8px", background: "#0d0d14", borderRadius: 4, marginBottom: 2 }}>
        <span style={{ fontSize: 10, color: "#888" }}>{source} · {d.label} · {d.base}({d.scaling}){magDmg > 0 ? `+${magDmg}wpn` : ""}{typeBonus > 0 ? ` +${Math.round(typeBonus*100)}%` : ""} {d.type.replace("_magical", "")}</span>
        <span style={{ fontSize: 11 }}>
          <span style={{ color: "#c8a8ff", fontWeight: 500 }}>{bodyDmg}</span>
          {headDmg != null && <span style={{ color: "#666", marginLeft: 4 }}>/ {headDmg} head</span>}
        </span>
      </div>
    );
  };

  // Collect all equipped damage sources
  const allDmgLines = [];
  selectedSkills.forEach(skId => {
    const skDef = classData.skills.find(s => s.id === skId);
    if (skDef?.dmg) skDef.dmg.forEach((d, di) => allDmgLines.push(renderDmgLine(skDef.name, d, di)));
  });
  selectedSpells.forEach(spId => {
    const spDef = classData.spells.find(s => s.id === spId);
    if (spDef?.dmg) spDef.dmg.forEach((d, di) => allDmgLines.push(renderDmgLine(spDef.name, d, di)));
  });

  // Render a derived stat block by ID
  const renderDerivedStat = (id) => {
    const L = (k) => derivedLabel(k, useAcronyms);
    switch (id) {
      case "hp": return <SR key={id} label={L("hp")} value={ds.health} detail={`rating ${ds.healthRating.toFixed(1)}`} />;
      case "ppb": return <div key={id}><SR label={L("ppb")} value={fmtPct(ds.ppb)} /><SubSR label={`From Power`} value={`${ds.physicalPower} (${fmtPct(ds.ppbFromCurve)})`} /><SubSR label="From Bonuses" value={ds.ppbFromBonuses > 0 ? fmtPct(ds.ppbFromBonuses) : "0"} /></div>;
      case "mpb": return <div key={id}><SR label={L("mpb")} value={fmtPct(ds.mpb)} /><SubSR label={`From Power`} value={`${ds.magicalPower} (${fmtPct(ds.mpbFromCurve)})`} /><SubSR label="From Bonuses" value={ds.mpbFromBonuses > 0 ? fmtPct(ds.mpbFromBonuses) : "0"} /></div>;
      case "pdr": return <div key={id}><CapSR label={L("pdr")} value={ds.pdr} cap={ds.pdrCap} curve={ds.pdrFromCurve} bonus={ds.pdrFromBonuses} /><SubSR label="From AR" value={`${ds.armorRating} (${fmtPct(ds.pdrFromCurve)})`} /><SubSR label="From Bonuses" value={ds.pdrFromBonuses > 0 ? fmtPct(ds.pdrFromBonuses) : "0"} /></div>;
      case "mdr": return <div key={id}><CapSR label={L("mdr")} value={ds.mdr} cap={ds.mdrCap} curve={ds.mdrFromCurve} bonus={ds.mdrFromBonuses} /><SubSR label="From MR" value={`${Math.round(ds.magicResistance)} (${fmtPct(ds.mdrFromCurve)})`} /><SubSR label="From Bonuses" value={ds.mdrFromBonuses > 0 ? fmtPct(ds.mdrFromBonuses) : "0"} />{ds.hasAntimagic && <SubSR label="Antimagic (×0.80)" value={fmtPct(1 - ds.effectiveMagicDmgTaken)} />}</div>;
      case "moveSpeed": return <SR key={id} label={L("moveSpeed")} value={ds.moveSpeed} />;
      case "actionSpeed": return <SR key={id} label={L("actionSpeed")} value={fmtPct(ds.actionSpeed)} detail={`rating ${ds.actionSpeedRating.toFixed(1)}`} />;
      case "spellCastingSpeed": return <SR key={id} label={L("spellCastingSpeed")} value={fmtPct(ds.spellCastingSpeed)} detail={ds.buffPostCurve?.spellCastingSpeed ? `+${fmtPct(ds.buffPostCurve.spellCastingSpeed)} from ES break` : null} />;
      case "regularInteractionSpeed": return <SR key={id} label={L("regularInteractionSpeed")} value={fmtPct(ds.regularInteractionSpeed)} detail={ds.religionBonuses?.regularInteractionSpeed ? `+${fmtPct(ds.religionBonuses.regularInteractionSpeed)} religion` : null} />;
      case "magicalInteractionSpeed": return <SR key={id} label={L("magicalInteractionSpeed")} value={fmtPct(ds.magicalInteractionSpeed)} />;
      case "cdr": return <SR key={id} label={L("cdr")} value={fmtPct(ds.cdr)} detail={ds.religionBonuses?.cdr ? `+${fmtPct(ds.religionBonuses.cdr)} religion` : null} />;
      case "buffDuration": return <SR key={id} label={L("buffDuration")} value={fmtPct(ds.buffDuration)} />;
      case "debuffDuration": return <SR key={id} label={L("debuffDuration")} value={fmtPct(ds.debuffDuration)} />;
      case "memoryCapacity": return <SR key={id} label={L("memoryCapacity")} value={ds.memoryCapacity} />;
      case "healthRecovery": return <SR key={id} label={L("healthRecovery")} value={fmtPct(ds.healthRecovery)} />;
      case "memoryRecovery": return <SR key={id} label={L("memoryRecovery")} value={fmtPct(ds.memoryRecovery)} />;
      case "magicalHealing": return <SR key={id} label={L("magicalHealing")} value={fmtPct(ds.magicalInteractionSpeed)} />;
      case "manualDexterity": return <SR key={id} label={L("manualDexterity")} value={fmtPct(ds.manualDexterity)} />;
      case "equipSpeed": return <SR key={id} label={L("equipSpeed")} value={fmtPct(ds.equipSpeed)} />;
      case "persuasiveness": return <SR key={id} label={L("persuasiveness")} value={Math.round(ds.persuasiveness)} detail={ds.religionBonuses?.persuasiveness ? `+${ds.religionBonuses.persuasiveness} religion` : null} />;
      case "armorPenetration": return <SR key={id} label={L("armorPenetration")} value={fmtPct(ds.armorPenetration)} />;
      case "magicPenetration": return <SR key={id} label={L("magicPenetration")} value={fmtPct(ds.magicPenetration)} detail={ds.religionBonuses?.magicPenetration ? `+${fmtPct(ds.religionBonuses.magicPenetration)} religion` : null} />;
      case "headshotDamageBonus": return <SR key={id} label={L("headshotDamageBonus")} value={fmtPct(ds.headshotDamageBonus)} />;
      case "headshotDamageReduction": return <SR key={id} label={L("headshotDamageReduction")} value={fmtPct(ds.headshotDamageReduction)} />;
      case "projectileDamageReduction": return <SR key={id} label={L("projectileDamageReduction")} value={fmtPct(ds.projectileDamageReduction)} />;
      default: return null;
    }
  };

  const ALL_DERIVED_IDS = ["hp", "ppb", "mpb", "pdr", "mdr", "moveSpeed", "actionSpeed", "spellCastingSpeed",
    "regularInteractionSpeed", "magicalInteractionSpeed", "cdr", "buffDuration", "debuffDuration",
    "memoryCapacity", "healthRecovery", "memoryRecovery", "manualDexterity", "equipSpeed", "persuasiveness",
    "armorPenetration", "magicPenetration", "headshotDamageBonus", "headshotDamageReduction", "projectileDamageReduction"];
  const minorStatIds = ALL_DERIVED_IDS.filter(id => !majorStatIds.includes(id));

  return (
    <div style={{ fontFamily: "'JetBrains Mono', monospace", background: "#0a0a0f", color: "#c8c8d4", minHeight: "100vh", padding: 20, maxWidth: 1200, margin: "0 auto" }}>
      <style>{`@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap');
        * { box-sizing: border-box; margin: 0; padding: 0; } body { background: #0a0a0f; }
        input[type=number]::-webkit-inner-spin-button, input[type=number]::-webkit-outer-spin-button { opacity: 1; }
        select option:disabled { color: #666; font-weight: 600; background: #0a0a0f; }
      `}</style>

      {/* Header */}
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", borderBottom: "1px solid #1e1e2e", paddingBottom: 16, marginBottom: 16 }}>
        <div>
          <h1 style={{ fontSize: 18, fontWeight: 600, color: "#e0e0ec", letterSpacing: "0.05em", textTransform: "uppercase" }}>D&D Simulator</h1>
          <div style={{ fontSize: 11, color: "#666", marginTop: 4 }}>Patch 6.10 · Season 8 · v0.4.0</div>
        </div>
        <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
          {/* Acronym toggle */}
          <div onClick={() => setUseAcronyms(!useAcronyms)} style={{ display: "flex", alignItems: "center", gap: 6, cursor: "pointer", background: "#10101c", border: "1px solid #1e1e2e", borderRadius: 20, padding: "4px 12px" }}>
            <span style={{ fontSize: 10, color: "#555" }}>Labels:</span>
            <div style={{ width: 32, height: 16, borderRadius: 8, background: useAcronyms ? "#6366f1" : "#2a2a3e", position: "relative", transition: "background 0.2s" }}>
              <div style={{ width: 12, height: 12, borderRadius: 6, background: "#e0e0ec", position: "absolute", top: 2, left: useAcronyms ? 18 : 2, transition: "left 0.2s" }} />
            </div>
            <span style={{ fontSize: 10, color: useAcronyms ? "#6366f1" : "#555", fontWeight: 600, minWidth: 36 }}>{useAcronyms ? "Short" : "Full"}</span>
          </div>
          {/* Class selector */}
          <select value={selectedClass} onChange={(e) => handleClassChange(e.target.value)}
            style={{ ...styles.select, fontSize: 12, minWidth: 120 }}>
            {Object.values(CLASSES).map(c => <option key={c.id} value={c.id}>{c.name}</option>)}
          </select>
        </div>
      </div>

      {/* ========== TWO-COLUMN LAYOUT ========== */}
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16, alignItems: "start" }}>

        {/* ═══ LEFT PANEL: COMBAT ═══ */}
        <div>

          {/* Weapon Held */}
          <Panel title="Weapon Held" color="#60a5fa">
            <div style={{ display: "flex", gap: 6 }}>
              {[["none", "Bare Hands"], ["weaponSlot1", gear.weaponSlot1?.primary?.name || "Weapon 1"], ["weaponSlot2", gear.weaponSlot2?.primary?.name || "Weapon 2"]].map(([k, l]) => (
                <button key={k} onClick={() => setWeapon(k)} style={{
                  flex: 1, background: weapon === k ? "#1a1a2e" : "transparent",
                  border: `1px solid ${weapon === k ? "#4a4a6e" : "#1e1e2e"}`,
                  color: weapon === k ? "#e0e0ec" : "#666", padding: "8px 12px", borderRadius: 4,
                  cursor: "pointer", fontFamily: "inherit", fontSize: 12, fontWeight: weapon === k ? 600 : 400,
                }}>{l}</button>
              ))}
            </div>
          </Panel>

          {/* Active Buffs */}
          {availableBuffs.length > 0 && (
            <Panel title="Active Buffs" color="#a78bfa">
              {availableBuffs.map(buff => {
                const active = !!activeBuffs[buff.id];
                return (
                  <div key={buff.id} style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "5px 0", borderBottom: "1px solid #111118" }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                      <button onClick={() => toggleBuff(buff.id)} style={{
                        width: 36, height: 20, borderRadius: 10, border: "none", cursor: "pointer",
                        background: active ? "#4a6a4a" : "#2a2a3e", position: "relative", transition: "background 0.2s",
                      }}>
                        <div style={{ width: 14, height: 14, borderRadius: 7, background: active ? "#6bff6b" : "#555",
                          position: "absolute", top: 3, left: active ? 19 : 3, transition: "left 0.2s, background 0.2s" }} />
                      </button>
                      <div>
                        <div style={{ fontSize: 11, color: active ? "#e0e0ec" : "#666", fontWeight: active ? 500 : 400 }}>{buff.name}</div>
                        <div style={{ fontSize: 9, color: "#444" }}>{buff.description}</div>
                      </div>
                    </div>
                    <div style={{ textAlign: "right", fontSize: 10, color: "#555" }}>
                      {buff.duration && <span>{buff.duration}</span>}
                      {buff.healthCost && <span style={{ color: "#a44", marginLeft: 6 }}>-{buff.healthCost} HP</span>}
                    </div>
                  </div>
                );
              })}
              {Object.values(activeBuffs).some(v => v) && (() => {
                const totalHpCost = availableBuffs.filter(b => activeBuffs[b.id] && b.healthCost).reduce((sum, b) => sum + b.healthCost, 0);
                return totalHpCost > 0 ? <div style={{ fontSize: 10, color: "#a44", marginTop: 4, textAlign: "right" }}>Total buff cast cost: -{totalHpCost} HP</div> : null;
              })()}
            </Panel>
          )}

          {/* Physical Damage — always shown (unarmed base 8, VERIFIED) */}
          <Panel title={`Physical Damage — ${computed.activeWeapon ? computed.activeWeapon.name : "Bare Hands"} vs Dummy`} color="#f59e0b">
            {(() => {
              const UNARMED_BASE = 8; // VERIFIED: 4 test points (body/head ± gauntlets)
              const baseWpnDmg = computed.activeWeapon ? computed.activeWeapon.weaponDamage : UNARMED_BASE;
              const gearWpnDmg = computed.bonuses.additionalWeaponDamage || 0;
              const buffWpnDmg = computed.bonuses.buffWeaponDamage || 0;
              const pen = ds.armorPenetration;
              const hsBonus = ds.headshotDamageBonus;
              // Unarmed: single hit, no combo. Weapons: use combo multipliers.
              const combos = computed.activeWeapon ? [1.0, 1.05, 1.1] : [1.0];
              // On-hit true physical damage from gear (e.g., Spiked Gauntlet +1)
              const truePhysDmg = (() => {
                let total = 0;
                for (const slot of ARMOR_SLOTS) {
                  const item = gear[slot];
                  if (item?.onHitEffects) {
                    for (const eff of item.onHitEffects) {
                      if (eff.trueDamage) total += eff.damage;
                    }
                  }
                }
                return total;
              })();
              return (
                <div style={{ display: "flex", gap: 8 }}>
                  {combos.map((cm, i) => {
                    const d = calcPhysicalMeleeDamage({ baseWeaponDmg: baseWpnDmg, buffWeaponDmg: buffWpnDmg, gearWeaponDmg: gearWpnDmg, ppb: ds.ppb, comboMultiplier: cm, targetPDR: -0.22, attackerPen: pen, truePhysicalDmg: truePhysDmg });
                    const dh = calcPhysicalMeleeDamage({ baseWeaponDmg: baseWpnDmg, buffWeaponDmg: buffWpnDmg, gearWeaponDmg: gearWpnDmg, ppb: ds.ppb, comboMultiplier: cm, targetPDR: -0.22, attackerPen: pen, hitLocation: "head", headshotBonus: hsBonus, truePhysicalDmg: truePhysDmg });
                    return (
                      <div key={i} style={{ flex: 1, background: "#1a150d", border: "1px solid #3a3020", borderRadius: 4, padding: "6px 8px" }}>
                        <div style={{ fontSize: 10, color: "#666", textAlign: "center", marginBottom: 4 }}>{combos.length > 1 ? `Hit ${i + 1}` : "Hit"} {cm !== 1.0 && <span style={{ color: "#555" }}>×{cm}</span>}</div>
                        <div style={{ display: "flex", gap: 4 }}>
                          <div style={{ flex: 1, background: "#1a180a", borderRadius: 3, padding: "4px 0", textAlign: "center" }}>
                            <div style={{ fontSize: 9, color: "#8a7a3a", textTransform: "uppercase", letterSpacing: "0.05em" }}>Body</div>
                            <div style={{ fontSize: 18, fontWeight: 700, color: "#f59e0b" }}>{d}</div>
                          </div>
                          <div style={{ flex: 1, background: "#1a0e0e", borderRadius: 3, padding: "4px 0", textAlign: "center" }}>
                            <div style={{ fontSize: 9, color: "#8a4a4a", textTransform: "uppercase", letterSpacing: "0.05em" }}>Head</div>
                            <div style={{ fontSize: 18, fontWeight: 700, color: "#f87171" }}>{dh}</div>
                          </div>
                        </div>
                      </div>
                    );
                  })}
                </div>
              );
            })()}
            {!computed.activeWeapon && <div style={{ fontSize: 9, color: "#444", marginTop: 4 }}>Unarmed base damage: 8 (verified)</div>}
          </Panel>

          {/* Spell & Skill Damage */}
          {allDmgLines.length > 0 && (
            <Panel title="Spell & Skill Damage vs Dummy" color="#f59e0b">
              <div style={{ fontSize: 9, color: "#444", marginBottom: 6 }}>MDR 7.5%{magDmg > 0 ? ` · +${magDmg} Magical Damage from ${computed.activeWeapon?.name || "weapon"}` : ""}</div>
              {allDmgLines}
            </Panel>
          )}

          {/* Target Properties */}
          <Panel title="Target Properties" color="#a78bfa">
            <div style={{ display: "flex", gap: 8 }}>
              {[{ label: "PDR", value: "-22%" }, { label: "MDR", value: "7.5%" }, { label: "HS DR", value: "0%" }].map(t => (
                <div key={t.label} style={{ flex: 1, display: "flex", justifyContent: "space-between", padding: "5px 10px", background: "#0b0b12", border: "1px solid #1e1e2e", borderRadius: 4, fontSize: 11 }}>
                  <span style={{ color: "#a78bfa" }}>{t.label}</span>
                  <span style={{ color: "#e0e0ec", fontWeight: 600 }}>{t.value}</span>
                </div>
              ))}
            </div>
            <div style={{ fontSize: 9, color: "#444", marginTop: 4 }}>Ruins Training Dummy — editable for custom targets (coming soon)</div>
          </Panel>

          {/* ── Class & Build Setup ── */}
          <Panel title={`Build — ${classData.name}`} color="#6366f1">
            {/* Perks */}
            <Collapsible title="Perks" color="#6366f1" badge={`${selectedPerks.length}/${classData.maxPerks}`} defaultOpen>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "2px 12px", padding: "4px 0" }}>
                {classData.perks.map(perk => {
                  const active = selectedPerks.includes(perk.id);
                  const atMax = !active && selectedPerks.length >= classData.maxPerks;
                  return (
                    <div key={perk.id} onClick={() => !atMax && togglePerk(perk.id)}
                      style={{ display: "flex", alignItems: "center", gap: 8, padding: "5px 6px", borderRadius: 4, cursor: atMax ? "not-allowed" : "pointer",
                        background: active ? "#141428" : "transparent", border: `1px solid ${active ? "#3a3a5e" : "transparent"}`, opacity: atMax ? 0.4 : 1 }}>
                      <div style={{ width: 14, height: 14, borderRadius: 3, border: `1px solid ${active ? "#6b8aff" : "#333"}`,
                        background: active ? "#6b8aff" : "transparent", flexShrink: 0, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 10, color: "#fff", fontWeight: 700 }}>{active ? "✓" : ""}</div>
                      <div style={{ minWidth: 0 }}>
                        <div style={{ fontSize: 11, color: active ? "#e0e0ec" : "#888", fontWeight: active ? 500 : 400, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{perk.name}</div>
                        <div style={{ fontSize: 9, color: "#444", whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{perk.desc}</div>
                      </div>
                    </div>
                  );
                })}
              </div>
            </Collapsible>

            {/* Skills */}
            {classData.skills.length > 0 && (
              <Collapsible title="Skills" color="#6366f1" badge={`${selectedSkills.length} slots`} defaultOpen>
                <div style={{ display: "flex", gap: 8, flexWrap: "wrap", padding: "4px 0" }}>
                  {[0, 1].map(slot => (
                    <select key={slot} value={selectedSkills[slot] || ""} onChange={(e) => handleSkillChange(slot, e.target.value)}
                      style={{ ...styles.select, minWidth: 180, fontSize: 11 }}>
                      <option value="">— empty —</option>
                      {classData.skills.filter(sk => !selectedSkills.includes(sk.id) || selectedSkills[slot] === sk.id)
                        .map(sk => <option key={sk.id} value={sk.id}>{sk.name}{sk.type === "spell_memory" ? ` (${sk.spellSlots} slots)` : ""}</option>)}
                    </select>
                  ))}
                </div>
              </Collapsible>
            )}

            {/* Spells */}
            {classData.spells.length > 0 && spellMemorySlots > 0 && (
              <Collapsible title="Spells" color="#6366f1"
                badge={`${totalMemoryCost}/${ds.memoryCapacity} memory${totalMemoryCost > ds.memoryCapacity ? " ⚠" : ""}`} defaultOpen>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "2px 12px", padding: "4px 0" }}>
                  {classData.spells.map(spell => {
                    const equipped = selectedSpells.includes(spell.id);
                    const atSlotMax = !equipped && selectedSpells.length >= spellMemorySlots;
                    return (
                      <div key={spell.id} onClick={() => !atSlotMax && toggleSpell(spell.id)}
                        style={{ padding: "4px 6px", borderRadius: 4, cursor: atSlotMax ? "not-allowed" : "pointer",
                          background: equipped ? "#141428" : "transparent", border: `1px solid ${equipped ? "#3a3a5e" : "transparent"}`, opacity: atSlotMax ? 0.4 : 1 }}>
                        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
                          <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                            <div style={{ width: 14, height: 14, borderRadius: 3, border: `1px solid ${equipped ? "#a855f7" : "#333"}`,
                              background: equipped ? "#a855f7" : "transparent", flexShrink: 0, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 10, color: "#fff", fontWeight: 700 }}>{equipped ? "✓" : ""}</div>
                            <span style={{ fontSize: 11, color: equipped ? "#e0e0ec" : "#888" }}>{spell.name}</span>
                          </div>
                          <div style={{ fontSize: 9, color: "#555", display: "flex", gap: 6 }}>
                            <span>T{spell.tier}</span><span>M{spell.memoryCost}</span>
                            {classData.spellCostType === "health" && <span style={{ color: "#a44" }}>-{spell.healthCost}HP</span>}
                          </div>
                        </div>
                      </div>
                    );
                  })}
                </div>
                {/* Memory bar */}
                <div style={{ marginTop: 6, background: "#0b0b12", border: `1px solid ${totalMemoryCost > ds.memoryCapacity ? "#f87171" : "#1e1e2e"}`, borderRadius: 5, padding: "6px 10px" }}>
                  <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 4 }}>
                    <span style={{ fontSize: 11, fontWeight: 600, color: totalMemoryCost > ds.memoryCapacity ? "#f87171" : "#4ade80" }}>
                      Memory: {totalMemoryCost} / {ds.memoryCapacity}
                    </span>
                    {totalMemoryCost > ds.memoryCapacity && <span style={{ fontSize: 10, color: "#f87171", fontWeight: 600 }}>⚠ Over by {totalMemoryCost - ds.memoryCapacity}</span>}
                    {totalMemoryCost <= ds.memoryCapacity && <span style={{ fontSize: 10, color: totalMemoryCost === ds.memoryCapacity ? "#f59e0b" : "#4ade80" }}>{ds.memoryCapacity - totalMemoryCost} remaining</span>}
                  </div>
                  <div style={{ height: 5, background: "#1a1a2e", borderRadius: 3, overflow: "hidden" }}>
                    <div style={{ height: "100%", borderRadius: 3, width: `${Math.min(100, (totalMemoryCost / ds.memoryCapacity) * 100)}%`,
                      background: totalMemoryCost > ds.memoryCapacity ? "#f87171" : totalMemoryCost === ds.memoryCapacity ? "#f59e0b" : "#4ade80", transition: "width 0.2s" }} />
                  </div>
                </div>
              </Collapsible>
            )}

            {/* Religion */}
            <Collapsible title="Religion" color="#6366f1" badge={religion !== "none" ? RELIGION_BLESSINGS.find(b => b.id === religion)?.name.replace("Blessing of ", "") : "None"}>
              <div style={{ display: "flex", alignItems: "center", gap: 12, padding: "4px 0" }}>
                <select value={religion} onChange={(e) => setReligion(e.target.value)} style={{ ...styles.select, minWidth: 200, fontSize: 11 }}>
                  {RELIGION_BLESSINGS.map(b => <option key={b.id} value={b.id}>{b.name}{b.description ? ` — ${b.description}` : ""}</option>)}
                </select>
                {religion !== "none" && (() => {
                  const b = RELIGION_BLESSINGS.find(x => x.id === religion);
                  return b ? <div style={{ fontSize: 10, color: "#888" }}>
                    {b.description}
                    {b.verification === "NOT_TESTED" && <span style={{ color: "#a86b32", fontSize: 9, marginLeft: 6 }}>UNVERIFIED</span>}
                  </div> : null;
                })()}
              </div>
            </Collapsible>
          </Panel>

          {/* Tests + Debug */}
          <div style={{ marginTop: 8 }}>
            <div style={{ display: "flex", gap: 8, alignItems: "center", marginBottom: 4 }}>
              <span style={{ fontSize: 10, color: fc > 0 ? "#f66" : "#4a8", fontWeight: 600 }}>{fc > 0 ? "⚠" : "✓"} {pc}/{tests.length} tests</span>
              <button onClick={() => setShowTests(showTests ? null : tests)} style={{ background: "none", border: "1px solid #1e1e2e", color: "#555", padding: "2px 8px", borderRadius: 3, cursor: "pointer", fontFamily: "inherit", fontSize: 9 }}>{showTests ? "Hide" : "Show"}</button>
              <button onClick={() => setShowDebug(!showDebug)} style={{ background: "none", border: "1px solid #1e1e2e", color: "#555", padding: "2px 8px", borderRadius: 3, cursor: "pointer", fontFamily: "inherit", fontSize: 9 }}>{showDebug ? "Hide" : "Show"} Debug</button>
            </div>
            {showTests && (
              <div style={{ background: "#0d0d14", border: "1px solid #1e1e2e", borderRadius: 6, padding: 8, maxHeight: 200, overflowY: "auto", fontSize: 10 }}>
                {showTests.map((t, i) => <div key={i} style={{ padding: "2px 0", color: t.status === "PASS" ? "#4a8" : "#f66" }}>{t.status === "PASS" ? "✓" : "✗"} {t.name}{t.status === "FAIL" && <span style={{ color: "#a66" }}> — exp {t.expected}, got {t.got}</span>}</div>)}
              </div>
            )}
            {showDebug && <pre style={{ marginTop: 8, background: "#0d0d14", border: "1px solid #1e1e2e", borderRadius: 6, padding: 8, fontSize: 9, overflow: "auto", maxHeight: 300, color: "#888" }}>{JSON.stringify({ attrs: computed.attrs, bonuses: computed.bonuses, derived: ds }, null, 2)}</pre>}
          </div>
        </div>

        {/* ═══ RIGHT PANEL: STATS + EQUIPMENT ═══ */}
        <div>

          {/* Attributes with hover breakdowns */}
          <Panel title="Attributes" color="#4ade80">
            <div style={{ fontSize: 9, color: "#444", marginBottom: 6 }}>Hover for source breakdown</div>
            <div style={{ display: "flex", gap: 4, flexWrap: "wrap" }}>
              {["str", "vig", "agi", "dex", "wil", "kno", "res"].map(a => (
                <AttrTooltip key={a} breakdown={attrBreakdown} attrKey={a} className={classData.name}>
                  <div style={{ padding: "4px 10px", background: "#0a1a10", border: "1px solid #1a3a1a", borderRadius: 4, fontSize: 12, color: "#4ade80", cursor: "default", display: "flex", gap: 4, alignItems: "baseline" }}>
                    <span style={{ fontWeight: 700, fontSize: 11, color: "#555" }}>{a.toUpperCase()}</span>
                    <span style={{ fontWeight: 700 }}>{computed.attrs[a]}</span>
                    <span style={{ fontSize: 9, color: "#333" }}>({classData.baseStats[a]})</span>
                  </div>
                </AttrTooltip>
              ))}
            </div>
          </Panel>

          {/* Major Derived Stats */}
          <Panel title={`${classData.name} — Key Stats`} color="#4ade80">
            {majorStatIds.map(id => renderDerivedStat(id))}
          </Panel>

          {/* Minor Derived Stats */}
          <Panel>
            <Collapsible title="Other Stats" color="#555" badge={`${minorStatIds.length} stats`}>
              {minorStatIds.map(id => renderDerivedStat(id))}
            </Collapsible>
          </Panel>

          {/* Equipment */}
          <Panel title={
            <span style={{ display: "flex", alignItems: "center", justifyContent: "space-between", width: "100%" }}>
              <span style={{ fontSize: 10, fontWeight: 700, color: "#555", textTransform: "uppercase", letterSpacing: "0.15em" }}>Equipment</span>
              <button onClick={() => setGearCollapsed(!gearCollapsed)} style={{ ...styles.addBtn }}>{gearCollapsed ? "Expand" : "Collapse"}</button>
            </span>
          }>
            {!gearCollapsed && ALL_SLOTS.map(s => <GearSlot key={s.key} slotDef={s} gear={gear} onGearChange={handleGearChange} />)}
            {gearCollapsed && <div style={{ fontSize: 10, color: "#444", padding: "4px 0" }}>
              {ALL_SLOTS.map(s => { const item = s.isWeapon ? gear[s.key]?.primary : gear[s.key]; return item ? item.name : null; }).filter(Boolean).join(" · ")}
            </div>}
          </Panel>
        </div>
      </div>

      <div style={{ marginTop: 20, padding: "12px 0", borderTop: "1px solid #1e1e2e", fontSize: 10, color: "#444" }}>v0.4.0 · {tests.length} tests · Layout restructure</div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
  </script>
</body>
</html>
