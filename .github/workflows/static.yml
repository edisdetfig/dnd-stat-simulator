# Build the Vite app and deploy dist/ to GitHub Pages
name: Deploy to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

# Opt into Node.js 24 runtime for JS-based actions. Node 20 becomes non-default
# on 2026-06-02, and Node 20 will be removed from runners "later in fall 2026"
# per https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/.
# Our direct action pins (checkout@v6, setup-node@v6, configure-pages@v6,
# upload-pages-artifact@v4, deploy-pages@v5) already declare node24. This env
# var is load-bearing only for the transitive upload-artifact@v4.6.2 pinned
# inside upload-pages-artifact@v4.0.0, which still declares node20. Safe to
# remove once (a) upload-pages-artifact releases a version that internally
# pins a node24 upload-artifact, or (b) 2026-06-02 lands and node24 is default.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
      - name: Setup Pages
        uses: actions/configure-pages@v6
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: './dist'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
